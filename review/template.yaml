AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SNSシステム レビュー資料管理

Parameters:
  Stage:
    Type: String
    AllowedValues:
      - develop
      - release
    Description: デプロイステージ
  SubSystem:
    Type: String
    Default: review
    AllowedValues:
      - review
    Description: サブシステム分類名

Conditions:
  IsRelease: !Equals [!Ref Stage, release]

Resources:
  # レビュー資料配信用S3バケット
  ReviewBucket:
    Type: AWS::S3::Bucket
    # releaseステージはデータ保護のため削除を禁止し、developステージは環境の再作成を容易にするため削除を許可する
    DeletionPolicy: !If [IsRelease, Retain, Delete]
    UpdateReplacePolicy: !If [IsRelease, Retain, Delete]
    Properties:
      BucketName: !Sub sns-${SubSystem}-${Stage}-${AWS::AccountId}
      # パブリックアクセスブロックを解除（インターネット公開を許可）
      PublicAccessBlockConfiguration:
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
        BlockPublicAcls: false
        IgnorePublicAcls: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      # ライフサイクルルールの設定
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldObjectsRule
            Status: Enabled
            # 有効期限（オブジェクト作成からの日数）の設定(約10年)
            ExpirationInDays: 3650
            # 特定のフォルダ（プレフィックス）にのみ適用する場合（バケット全体なら空文字 ""）
            Prefix: ""

  # CloudFrontからS3へのアクセスを許可するバケットポリシー
  ReviewBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReviewBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub ${ReviewBucket.Arn}/*

  # CloudFrontディストリビューション
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    # releaseステージはデータ保護のため削除を禁止し、developステージは環境の再作成を容易にするため削除を許可する
    DeletionPolicy: !If [IsRelease, Retain, Delete]
    UpdateReplacePolicy: !If [IsRelease, Retain, Delete]
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        # トップページ（例: index.html）の自動補完設定
        DefaultRootObject: index.html
        Origins:
          - Id: S3WebsiteOrigin
            # S3のWebsiteURL（http://...）からドメイン部分だけを抽出
            DomainName: !Select [2, !Split ["/", !GetAtt ReviewBucket.WebsiteURL]]
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only # S3ウェブサイトホスティングはHTTPのみ対応
        DefaultCacheBehavior:
          TargetOriginId: S3WebsiteOrigin
          ViewerProtocolPolicy: redirect-to-https # HTTPアクセスを自動でHTTPSにリダイレクト
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          # 拡張されたキャッシュポリシー（推奨：CachingOptimized）
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
          Compress: true
        # 日本を含むPriceClass_200を指定
        PriceClass: PriceClass_200

Outputs:
  CloudFrontDomainName:
    Description: CloudFrontのドメイン名
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub sns-${SubSystem}-${Stage}-DomainName

  ReviewBucketName:
    Description: レビュー資料格納S3バケット名
    Value: !Ref ReviewBucket
    Export:
      Name: !Sub sns-${SubSystem}-${Stage}-BucketName
