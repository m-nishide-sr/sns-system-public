name: SNSシステム 認証基盤 CI/CD

on:
  push:
    branches:
      - develop
      - release
    paths:
      - 'auth/**'
      - '.github/workflows/sns-system-auth-cicd.yaml'
  pull_request:
    paths:
      - 'auth/**'
      - '.github/workflows/sns-system-auth-cicd.yaml'

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: 検証
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Rustツールチェーンのセットアップ
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: AWS SAM CLIのセットアップ
        uses: aws-actions/setup-sam@v2

      - name: sam validate --lint の実行
        working-directory: auth
        env:
          AWS_DEFAULT_REGION: ap-northeast-3
        run: sam validate --lint

      - name: cargo check の実行
        working-directory: auth/PreSignUpFunction
        run: cargo check

      - name: cargo clippy の実行
        working-directory: auth/PreSignUpFunction
        run: cargo clippy

      - name: cargo test の実行
        working-directory: auth/PreSignUpFunction
        run: cargo test --all-features -- --include-ignored

  deploy:
    name: デプロイ
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/release')
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: AWSクレデンシャルの設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-3

      - name: Rustツールチェーンのセットアップ
        uses: dtolnay/rust-toolchain@stable

      - name: cargo-lambdaのインストール
        run: pip install cargo-lambda

      - name: AWS SAM CLIのセットアップ
        uses: aws-actions/setup-sam@v2

      - name: デプロイステージの設定
        id: stage
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "stage=develop" >> "$GITHUB_OUTPUT"
          else
            echo "stage=release" >> "$GITHUB_OUTPUT"
          fi

      - name: sam build の実行
        working-directory: auth
        run: sam build

      - name: sam deploy の実行
        working-directory: auth
        env:
          ALLOW_DOMAIN: ${{ secrets.ALLOW_DOMAIN }}
        run: |
          sam deploy \
            --stack-name sns-auth-${{ steps.stage.outputs.stage }} \
            --role-arn ${{ secrets.SAM_DEPLOY_ROLE_ARN }} \
            --parameter-overrides \
              Stage=${{ steps.stage.outputs.stage }} \
              AllowDomain="$ALLOW_DOMAIN" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3
