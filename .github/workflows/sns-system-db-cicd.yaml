name: sns-system-db-cicd

on:
  pull_request:
    paths:
      - "db/**"
      - ".github/workflows/sns-system-db-cicd.yaml"
  push:
    branches:
      - develop
      - release
    paths:
      - "db/**"
      - ".github/workflows/sns-system-db-cicd.yaml"

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: ap-northeast-3

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: aws-actions/setup-sam@v2
      - name: SAMテンプレート検証
        run: sam validate --lint --template-file db/template.yaml
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo fmt
        run: cargo fmt -- --check
        working-directory: db/sea_orm_entities
      - name: cargo check
        run: cargo check
        working-directory: db/sea_orm_entities
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: db/sea_orm_entities
      - name: PostgreSQL起動
        run: |
          docker run --name testdb-postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_USER=postgres -e POSTGRES_DB=postgres -p 5432:5432 -d postgres:16
          until docker exec testdb-postgres pg_isready -U postgres -d postgres; do
            sleep 1
          done
      - name: Liquibaseマイグレーション（local）
        run: |
          docker run --rm \
            -e LIQUIBASE_HUB_MODE=off \
            --network host \
            -v "${{ github.workspace }}:/workspace" \
            liquibase/liquibase:4.33.0 \
            --search-path=/workspace \
            --changelog-file=db/liquibase/changelog.xml \
            --contexts=local \
            --url=jdbc:postgresql://localhost:5432/postgres \
            --username=postgres \
            --password=postgres \
            update
      - name: cargo test
        run: cargo test -- --include-ignored
        working-directory: db/sea_orm_entities

  migrate:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
      - name: AWS認証
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/setup-sam@v2
      - name: SAMデプロイ
        run: |
          STAGE=${{ github.ref == 'refs/heads/release' && 'release' || 'develop' }}
          sam deploy \
            --template-file db/template.yaml \
            --stack-name sns-db-${STAGE} \
            --parameter-overrides Stage=${STAGE} \
            --capabilities CAPABILITY_NAMED_IAM \
            --role-arn "${{ secrets.SAM_DEPLOY_ROLE_ARN }}" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
      - name: Liquibaseマイグレーション（Aurora DSQL）
        run: |
          STAGE=${{ github.ref == 'refs/heads/release' && 'release' || 'develop' }}
          STACK_NAME=sns-db-${STAGE}
          DSQL_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].Outputs[?ExportName=='${STACK_NAME}-DSQLEndpoint'].OutputValue" \
            --output text)
          LAMBDA_ROLE_ARN=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].Outputs[?ExportName=='${STACK_NAME}-LambdaRoleArn'].OutputValue" \
            --output text)
          TOKEN=$(aws dsql generate-db-connect-admin-auth-token --region "${AWS_REGION}" --expires-in 3600 --hostname "${DSQL_ENDPOINT}")
          echo "::add-mask::$TOKEN"
          docker run --rm \
            -e LIQUIBASE_HUB_MODE=off \
            -v "${{ github.workspace }}:/workspace" \
            liquibase/liquibase:4.33.0 \
            --search-path=/workspace \
            --changelog-file=db/liquibase/changelog.xml \
            --contexts="${STAGE}" \
            --url="jdbc:postgresql://${DSQL_ENDPOINT}/postgres" \
            --username=admin \
            --password="${TOKEN}" \
            --classpath=/workspace \
            --changeLogParameters.LambdaRoleArn="${LAMBDA_ROLE_ARN}" \
            update

  generate_orm:
    if: github.event_name == 'push'
    needs: migrate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
      - name: AWS認証
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: sea-orm-cliインストール
        run: cargo install sea-orm-cli --version 1.1.20 --locked --no-default-features --features native-tls,codegen,postgres
      - name: ORM生成
        run: |
          STAGE=${{ github.ref == 'refs/heads/release' && 'release' || 'develop' }}
          DSQL_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name "sns-db-${STAGE}" \
            --query "Stacks[0].Outputs[?ExportName=='sns-db-${STAGE}-DSQLEndpoint'].OutputValue" \
            --output text)
          TOKEN=$(aws dsql generate-db-connect-admin-auth-token --region "${AWS_REGION}" --expires-in 3600 --hostname "${DSQL_ENDPOINT}")
          echo "::add-mask::$TOKEN"
          ENCODED_TOKEN=$(printf '%s' "${TOKEN}" | jq -rR @uri)
          DATABASE_URL="postgres://admin:${ENCODED_TOKEN}@${DSQL_ENDPOINT}:5432/postgres?sslmode=require"
          sea-orm-cli generate entity \
            -u "${DATABASE_URL}" \
            -o db/sea_orm_entities/src/entity \
            --ignore-tables databasechangelog \
            --ignore-tables databasechangeloglock
      - name: 自動コミット
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "db: sea-orm entityを自動更新"
