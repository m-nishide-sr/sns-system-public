name: SNSシステム DB CI/CD

on:
  push:
    branches:
      - develop
      - release
    paths:
      - 'db/**'
      - '.github/workflows/sns-system-db-cicd.yaml'
  pull_request:
    paths:
      - 'db/**'
      - '.github/workflows/sns-system-db-cicd.yaml'

permissions:
  id-token: write
  contents: write

jobs:
  validate:
    name: 検証
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v7

      - name: Rustツールチェーンのセットアップ
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: AWS SAM CLIのセットアップ
        uses: aws-actions/setup-sam@v3

      - name: sam validate --lint の実行
        env:
          AWS_DEFAULT_REGION: ap-northeast-3
        run: sam validate --lint --template-file db/template.yaml

      - name: cargo fmt -- --check の実行
        working-directory: db/sea_orm_entities
        run: cargo fmt -- --check

      - name: cargo check の実行
        working-directory: db/sea_orm_entities
        run: cargo check

      - name: cargo clippy の実行
        working-directory: db/sea_orm_entities
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: PostgreSQLの起動
        run: |
          docker run --rm --name testdb-postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            -d postgres:16
          until docker exec testdb-postgres pg_isready -U postgres -d postgres; do
            sleep 1
          done

      - name: Liquibaseでローカルマイグレーション
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}:/workspace" \
            liquibase/liquibase:4.33.0 \
            --search-path=/workspace \
            update \
            --changelog-file=db/liquibase/changelog.xml \
            --context-filter=local \
            --url=jdbc:postgresql://localhost:5432/postgres \
            --username=postgres \
            --password=postgres \
            -DStage=local \
            -DAWS_ACCOUNT_ID=123456789012

      - name: cargo test --all-features -- --include-ignored の実行
        working-directory: db/sea_orm_entities
        run: cargo test --all-features -- --include-ignored

  migrate:
    name: マイグレーション
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/release')
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v7

      - name: AWSクレデンシャルの設定
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-3

      - name: AWS SAM CLIのセットアップ
        uses: aws-actions/setup-sam@v3

      - name: デプロイステージの設定
        id: stage
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "stage=develop" >> "$GITHUB_OUTPUT"
          else
            echo "stage=release" >> "$GITHUB_OUTPUT"
          fi

      - name: sam deploy の実行
        run: |
          sam deploy \
            --template-file db/template.yaml \
            --stack-name sns-db-${{ steps.stage.outputs.stage }} \
            --role-arn ${{ secrets.SAM_DEPLOY_ROLE_ARN }} \
            --parameter-overrides \
              Stage=${{ steps.stage.outputs.stage }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3

      - name: Liquibaseでマイグレーション
        env:
          STAGE: ${{ steps.stage.outputs.stage }}
        run: |
          DSQL_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name sns-db-${STAGE} \
            --query "Stacks[0].Outputs[?OutputKey=='DSQLEndpoint'].OutputValue" \
            --output text)
          echo "::add-mask::$DSQL_ENDPOINT"

          TOKEN=$(aws dsql generate-db-connect-admin-auth-token \
            --hostname "$DSQL_ENDPOINT" \
            --region ap-northeast-3)
          echo "::add-mask::$TOKEN"

          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
          echo "::add-mask::$AWS_ACCOUNT_ID"

          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            liquibase/liquibase:4.33.0 \
            --search-path=/workspace \
            update \
            --changelog-file=db/liquibase/changelog.xml \
            --context-filter=$STAGE \
            --url="jdbc:postgresql://$DSQL_ENDPOINT/postgres" \
            --username=admin \
            --password="$TOKEN" \
            -DStage=$STAGE \
            -DAWS_ACCOUNT_ID=$AWS_ACCOUNT_ID

  generate_orm:
    name: ORM定義生成
    needs: migrate
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/release')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: AWSクレデンシャルの設定
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-3

      - name: Rustツールチェーンのセットアップ
        uses: dtolnay/rust-toolchain@stable

      - name: jqのインストール
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: sea-orm-cliのインストール
        run: cargo install sea-orm-cli --locked

      - name: デプロイステージとエンドポイントの設定
        id: dsql
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            STAGE=develop
          else
            STAGE=release
          fi
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

          DSQL_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name sns-db-${STAGE} \
            --query "Stacks[0].Outputs[?OutputKey=='DSQLEndpoint'].OutputValue" \
            --output text)
          echo "::add-mask::$DSQL_ENDPOINT"
          echo "endpoint=$DSQL_ENDPOINT" >> "$GITHUB_OUTPUT"

      - name: ORM定義の生成
        env:
          DSQL_ENDPOINT: ${{ steps.dsql.outputs.endpoint }}
        run: |
          TOKEN=$(aws dsql generate-db-connect-admin-auth-token \
            --region ap-northeast-3 \
            --expires-in 3600 \
            --hostname "$DSQL_ENDPOINT")
          echo "::add-mask::$TOKEN"

          ENCODED_TOKEN=$(printf '%s' "$TOKEN" | jq -rR @uri)
          DATABASE_URL="postgres://admin:${ENCODED_TOKEN}@${DSQL_ENDPOINT}:5432/postgres?sslmode=require"

          sea-orm-cli generate entity \
            -u "$DATABASE_URL" \
            -o db/sea_orm_entities/src/entity \
            --ignore-tables databasechangelog \
            --ignore-tables databasechangeloglock

      - name: 変更がある場合にコミット
        run: |
          if git diff --quiet -- db/sea_orm_entities/src/entity; then
            echo "変更なし"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/sea_orm_entities/src/entity
          git commit -m "DBスキーマ変更に伴うORM定義の自動更新"
          git push
