# ==============================================================================
# SNSシステム APIサブシステム CI/CDワークフロー
#
# トリガー: api/ または db/ 配下のファイル変更時
# jobs:
#   validate - 静的解析・コンパイルチェック・テスト
#   deploy   - AWS SAMによるデプロイ（mainブランチへのpush時のみ）
# ==============================================================================

name: sns-system-api-cicd

on:
  push:
    branches:
      - main
      - develop
      - release
    paths:
      - 'api/**'
      - 'db/**'
  pull_request:
    paths:
      - 'api/**'
      - 'db/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-3
  RUST_TOOLCHAIN: stable

jobs:
  # ============================================================================
  # validate: 静的解析・コンパイルチェック・テスト
  # ============================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Rustツールチェーンのセットアップ
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
          targets: aarch64-unknown-linux-gnu

      - name: Rustキャッシュの設定
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api/lambda

      - name: AWS SAMのセットアップ
        uses: aws-actions/setup-sam@v2

      - name: SAMテンプレートの検証
        run: sam validate --lint --template api/template.yaml

      - name: コンパイルチェック (cargo check)
        working-directory: api/lambda
        run: cargo check

      - name: フォーマットチェック (cargo fmt)
        working-directory: api/lambda
        run: cargo fmt -- --check

      - name: 静的解析 (cargo clippy)
        working-directory: api/lambda
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Liquibaseによるマイグレーション実施
        env:
          # テスト用PostgreSQLの認証情報（ローカルCI専用）
          LIQUIBASE_COMMAND_PASSWORD: postgres
        run: |
          docker run --rm \
            -e LIQUIBASE_HUB_MODE=off \
            -e LIQUIBASE_COMMAND_PASSWORD \
            --network host \
            -v "${{ github.workspace }}:/workspace" \
            liquibase/liquibase:4.33.0 \
            --search-path=/workspace \
            --changelog-file=db/liquibase/changelog.xml \
            --contexts=local \
            --url=jdbc:postgresql://localhost:5432/postgres \
            --username=postgres \
            update

      - name: テスト実行 (cargo test)
        working-directory: api/lambda
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: cargo test --all-features -- --include-ignored

  # ============================================================================
  # deploy: AWS SAMによるデプロイ（mainブランチへのpush時のみ）
  # ============================================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release'

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Rustツールチェーンのセットアップ
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-unknown-linux-gnu

      - name: Rustキャッシュの設定
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api/lambda

      - name: AWS SAMのセットアップ
        uses: aws-actions/setup-sam@v2

      - name: AWS認証の設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ステージ名の決定
        id: stage
        run: |
          if [ "${{ github.ref }}" = "refs/heads/release" ]; then
            echo "name=release" >> "$GITHUB_OUTPUT"
          else
            echo "name=develop" >> "$GITHUB_OUTPUT"
          fi

      - name: Aurora DSQLエンドポイントの取得
        id: dsql
        run: |
          DSQL_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name sns-db-${{ steps.stage.outputs.name }} \
            --query "Stacks[0].Outputs[?ExportName=='sns-db-${{ steps.stage.outputs.name }}-DSQLEndpoint'].OutputValue" \
            --output text)
          echo "endpoint=${DSQL_ENDPOINT}" >> "$GITHUB_OUTPUT"

      - name: SAMビルド
        working-directory: api
        run: sam build

      - name: SAMデプロイ
        working-directory: api
        run: |
          sam deploy \
            --stack-name sns-api-${{ steps.stage.outputs.name }} \
            --role-arn ${{ secrets.SAM_DEPLOY_ROLE_ARN }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Stage=${{ steps.stage.outputs.name }} \
              DsqlEndpoint=${{ steps.dsql.outputs.endpoint }}
