::entity::prelude::Uuid;\nuse sea_orm::{ConnectionTrait, DatabaseConnection, DbBackend, QueryResult, Statement};\n\n/// SeaORMを利用したメッセージRepository実装。\n#[derive(Clone)]\npub struct SeaOrmMessageRepository {\n    db: DatabaseConnection,\n}\n\nimpl SeaOrmMessageRepository {\n    /// DB接続を受け取りRepositoryを生成する。\n    pub fn new(db: DatabaseConnection) -\u003e Self {\n        Self { db }\n    }\n}\n\n#[async_trait]\nimpl MessageRepository for SeaOrmMessageRepository {\n    async fn list_latest(\n        \u0026self,\n        before: Option\u003cDateTime\u003cUtc\u003e\u003e,\n        limit: u64,\n    ) -\u003e CoreResult\u003cVec\u003cTimelineMessage\u003e\u003e {\n        let statement = build_timeline_statement(before, limit);\n        let rows = self.db.query_all(statement).await.map_err(|e| {\n            tracing::error!(\"タイムライン取得に失敗しました: {e}\");\n            CoreError::Infrastructure(format!(\"タイムライン取得に失敗しました: {e}\"))\n        })?;\n\n        rows.into_iter().map(to_timeline_message).collect()\n    }\n\n    async fn create(\u0026self, input: NewMessage) -\u003e CoreResult\u003c()\u003e {\n        // Statementの組み立て\n        let statement = build_create_message_statement(input);\n\n        self.db.query_all(statement).await.map_err(|e| {\n            tracing::error!(\"メッセージ作成に失敗しました: {e}\");\n            CoreError::Infrastructure(format!(\"メッセージ作成に失敗しました: {e}\"))\n        })?;\n\n        Ok(())\n    }\n}\n\nfn build_create_message_statement(input: NewMessage) -\u003e Statement {\n    // 挿入する値を準備\n    let id = Uuid::now_v7();\n    let user_name = input.user_name.as_str().to_string();\n    let cognito_id = input.user_id.into_inner();\n    let created_at: chrono::DateTime\u003cchrono::FixedOffset\u003e = input.created_at.into(); // 型は環境に合わせて調整してください\n    let body = input.body.as_str().to_string();\n    let row_log = input.row_log;\n    let is_from_user = input.is_from_user;\n\n    Statement::from_sql_and_values(\n        DbBackend::Postgres,\n        r#\"\n                INSERT INTO public.messages (id, user_name, cognito_id, created_at, body, row_log, is_from_user)\n                VALUES ($1, $2, $3, $4, $5, $6, $7)\n            \"#,\n        [\n            id.into(),\n            user_name.into(),\n            cognito_id.into(),\n            created_at.into(),\n            body.into(),\n            row_log.into(),\n            is_from_user.into(),\n        ],\n    )\n}\n\nfn build_timeline_statement(before: Option\u003cDateTime\u003cUtc\u003e\u003e, limit: u64) -\u003e Statement {\n    let safe_limit = if limit == 0 || limit \u003e 50 {\n        50\n    } else {\n        limit as i64\n    };\n\n    match before {\n        Some(before) =\u003e Statement::from_sql_and_values(\n            DbBackend::Postgres,\n            r#\"\n                SELECT user_name, created_at, body, is_from_user\n                FROM public.messages_latest\n                WHERE created_at \u003c $1\n                ORDER BY created_at DESC\n                LIMIT $2\n            \"#,\n            [before.into(), safe_limit.into()],\n        ),\n        None =\u003e Statement::from_sql_and_values(\n            DbBackend::Postgres,\n            r#\"\n                SELECT user_name, created_at, body, is_from_user\n                FROM public.messages_latest\n                ORDER BY created_at DESC\n                LIMIT $1\n            \"#,\n            [safe_limit.into()],\n        ),\n    }\n}\n\nfn to_timeline_message(row: QueryResult) -\u003e CoreResult\u003cTimelineMessage\u003e {\n    let created_at = row\n        .try_get::\u003cDateTime\u003cUtc\u003e\u003e(\"\", \"created_at\")\n        .map_err(|e| {\n            tracing::error!(\"created_atの変換に失敗しました: {e}\");\n            CoreError::Infrastructure(format!(\"created_atの変換に失敗しました: {e}\"))\n        })?;\n\n    Ok(TimelineMessage {\n        user_name: row.try_get(\"\", \"user_name\").map_err(|e| {\n            tracing::error!(\"user_nameの変換に失敗しました: {e}\");\n            CoreError::Infrastructure(format!(\"user_nameの変換に失敗しました: {e}\"))\n        })?,\n        created_at,\n        body: row.try_get(\"\", \"body\").map_err(|e| {\n            tracing::error!(\"bodyの変換に失敗しました: {e}\");\n            CoreError::Infrastructure(format!(\"bodyの変換に失敗しました: {e}\"))\n        })?,\n        is_from_user: row.try_get(\"\", \"is_from_user\").map_err(|e| {\n            tracing::error!(\"is_from_userの変換に失敗しました: {e}\");\n            CoreError::Infrastructure(format!(\"is_from_userの変換に失敗しました: {e}\"))\n        })?,\n    })\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::{\n        PostgreSQLConnectionInfo,\n        db::{DBType, create_db},\n    };\n    use chrono::Utc;\n    use core_common::Clock;\n    // use sea_orm::{ActiveModelTrait, ColumnTrait, Database, EntityTrait, QueryFilter, Set};\n    // use sea_orm_entities::entity::messages::{self, Column, Entity as Messages};\n    use core_usecase::{\n        GetTimelineInput, GetTimelineOutput, GetTimelineUseCase, PostMessageInput,\n        PostMessageUseCase, TimelineItem,\n    };\n    use serde::{Deserialize, Serialize};\n\n    // テスト用の時刻固定モック構造体\n    struct MockClock {\n        fixed_time: DateTime\u003cUtc\u003e,\n    }\n\n    impl MockClock {\n        /// 指定した初期時刻でモックを作成する\n        pub fn new(initial_time: DateTime\u003cUtc\u003e) -\u003e Self {\n            Self {\n                fixed_time: initial_time,\n            }\n        }\n\n        /// テストの途中で任意の時刻に変更する\n        #[allow(unused)]\n        pub fn set_time(\u0026mut self, new_time: DateTime\u003cUtc\u003e) {\n            self.fixed_time = new_time;\n        }\n\n        /// テストの途中で任意の時刻を加算する\n        #[allow(unused)]\n        pub fn add_time(\u0026mut self, duration: chrono::Duration) {\n            self.fixed_time += duration;\n        }\n    }\n\n    // Clock トレイトを実装\n    impl Clock for MockClock {\n        fn now(\u0026self) -\u003e DateTime\u003cUtc\u003e {\n            self.fixed_time\n        }\n    }\n    /// タイムライン取得レスポンス。\n    #[derive(Debug, Clone, Serialize, Deserialize, PartialEq, Eq)]\n    pub struct TimelineMessageResponse {\n        /// 投稿者名。\n        pub user_name: String,\n        /// 投稿日時。\n        pub created_at: DateTime\u003cUtc\u003e,\n        /// 投稿本文。\n        pub body: String,\n        /// 利用者投稿かどうか。\n        pub is_from_user: bool,\n    }\n\n    impl From\u003cTimelineItem\u003e for TimelineMessageResponse {\n        fn from(value: TimelineItem) -\u003e Self {\n            Self {\n                user_name: value.user_name,\n                created_at: value.created_at,\n                body: value.body,\n                is_from_user: value.is_from_user,\n            }\n        }\n    }\n\n    #[test]\n    fn limitが0の場合はクエリで50件に補正する() {\n        let statement = build_timeline_statement(None, 0);\n        let debug = format!(\"{statement:?}\");\n        assert!(debug.contains(\"LIMIT $1\"));\n        assert!(debug.contains(\"50\"));\n    }\n\n    #[test]\n    fn limitが51以上の場合もクエリで50件に補正する() {\n        let statement = build_timeline_statement(None, 99);\n        let debug = format!(\"{statement:?}\");\n        assert!(debug.contains(\"LIMIT $1\"));\n        assert!(debug.contains(\"50\"));\n    }\n\n    #[test]\n    fn beforeありのクエリを組み立てる() {\n        let before = Utc::now();\n        let statement = build_timeline_statement(Some(before), 10);\n        let debug = format!(\"{statement:?}\");\n        assert!(debug.contains(\"WHERE created_at \u003c $1\"));\n        assert!(debug.contains(\"LIMIT $2\"));\n    }\n\n    #[test]\n    fn メッセージ作成sqlを組み立てる() {\n        let statement = build_create_message_statement(NewMessage {\n            user_name: core_domain::UserName::new(\"taro\").expect(\"正常系で失敗しない想定\"),\n            user_id: core_domain::UserId::new(uuid::Uuid::now_v7()),\n            body: core_domain::MessageBody::new(\"hello\").expect(\"正常系で失敗しない想定\"),\n            created_at: Utc::now(),\n            is_from_user: true,\n            row_log: \"row-log\".to_string(),\n        });\n\n        let debug = format!(\"{statement:?}\");\n        assert!(debug.contains(\"INSERT INTO public.messages\"));\n        assert!(debug.contains(\"VALUES ($1, $2, $3, $4, $5, $6, $7)\"));\n    }\n\n    #[tokio::test]\n    #[ignore = \"ローカルのDBが必要なためデフォルトでは実行しない\"]\n    async fn 実際にローカルの_postgre_sqlに接続するテスト() {\n        let db = create_db(DBType::PostgreSQL(PostgreSQLConnectionInfo {\n            role: \"lambda\",\n            password: \"lambda\",\n        }))\n        .await\n        .unwrap();\n        let repository = SeaOrmMessageRepository::new(db.clone());\n        let now = chrono::Utc::now().fixed_offset();\n\n        let first_uuid = uuid::Uuid::new_v4();\n        let email = format!(\"local-get-{}@example.com\", first_uuid);\n        let clock = MockClock::new(now.into());\n        let usecase = PostMessageUseCase::new(repository.clone(), clock);\n        usecase\n            .execute(PostMessageInput {\n                user_id: first_uuid,\n                user_name: email.clone(),\n                body: \"older body\".to_string(),\n                row_log: \"older row log\".to_string(),\n                is_from_user: true,\n            })\n            .await\n            .expect(\"older test message insert should succeed\");\n\n        let second_uuid = uuid::Uuid::new_v4();\n        let second_email = format!(\"local-get-{}@example.com\", second_uuid);\n        let clock = MockClock::new((now + chrono::Duration::seconds(1)).into());\n        let usecase = PostMessageUseCase::new(repository.clone(), clock);\n        usecase\n            .execute(PostMessageInput {\n                user_id: second_uuid,\n                user_name: second_email.clone(),\n                body: \"second body\".to_string(),\n                row_log: \"second row log\".to_string(),\n                is_from_user: false,\n            })\n            .await\n            .expect(\"newer test message insert should succeed\");\n\n        let third_uuid = uuid::Uuid::new_v4();\n        let third_email = format!(\"local-get-{}@example.com\", third_uuid);\n        let clock = MockClock::new((now + chrono::Duration::seconds(2)).into());\n        let usecase = PostMessageUseCase::new(repository.clone(), clock);\n        usecase\n            .execute(PostMessageInput {\n                user_id: third_uuid,\n                user_name: third_email.clone(),\n                body: \"third body\".to_string(),\n                row_log: \"third row log\".to_string(),\n                is_from_user: true,\n            })\n            .await\n            .expect(\"newer test message insert should succeed\");\n\n        let usecase = GetTimelineUseCase::new(repository.clone());\n        let output: GetTimelineOutput = match usecase\n            .execute(GetTimelineInput {\n                limit: 2,\n                before: None,\n            })\n            .await\n        {\n            Ok(output) =\u003e output,\n            Err(err) =\u003e panic!(\"usecase execution failed: {}\", err),\n        };\n        assert_eq!(output.items.len(), 2);\n        let response: Vec\u003cTimelineMessageResponse\u003e = output\n            .items\n            .into_iter()\n            .map(TimelineMessageResponse::from)\n            .collect();\n\n        assert_eq!(\n            response[0].created_at,\n            (now + chrono::Duration::seconds(2))\n                .format(\"%Y-%m-%dT%H:%M:%S.%6fZ\")\n                .to_string()\n                .parse::\u003cDateTime\u003cUtc\u003e\u003e()\n                .unwrap()\n        );\n        assert_eq!(\n            response[1].created_at,\n            (now + chrono::Duration::seconds(1))\n                .format(\"%Y-%m-%dT%H:%M:%S.%6fZ\")\n                .to_string()\n                .parse::\u003cDateTime\u003cUtc\u003e\u003e()\n                .unwrap()\n        );\n\n        assert_eq!(response[0].body, \"third body\");\n        assert_eq!(response[1].body, \"second body\");\n\n        assert!(response[0].is_from_user eOutput {\n    /// 処理結果。\n    pub status: String,\n    /// 利用者向けメッセージ。\n    pub message: String,\n}\n\n/// メッセージ投稿を実行するアプリケーションサービス。\npub struct PostMessageUseCase\u003cR: MessageRepository, C: Clock\u003e {\n    repository: R,\n    clock: C,\n}\n\nimpl\u003cR: MessageRepository, C: Clock\u003e PostMessageUseCase\u003cR, C\u003e {\n    /// リポジトリと時刻プロバイダを受け取りユースケースを生成する。\n    pub fn new(repository: R, clock: C) -\u003e Self {\n        Self { repository, clock }\n    }\n\n    /// メッセージを作成して保存する。\n    pub async fn execute(\u0026self, input: PostMessageInput) -\u003e CoreResult\u003cPostMessageOutput\u003e {\n        let user_name = UserName::new(input.user_name)?;\n        let body = MessageBody::new(input.body)?;\n\n        self.repository\n            .create(NewMessage {\n                user_name,\n                user_id: UserId::new(input.user_id),\n                body,\n                created_at: self.clock.now().with_timezone(\u0026Utc),\n                is_from_user: input.is_from_user,\n                row_log: input.row_log,\n            })\n            .await?;\n\n        Ok(PostMessageOutput {\n            status: \"success\".to_string(),\n            message: \"メッセージを投稿しました\".to_string(),\n        })\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use async_trait::async_trait;\n    use chrono::{DateTime, TimeZone};\n    use core_common::{Clock, CoreError};\n    use core_domain::{MessageRepository, NewMessage, TimelineMessage};\n    use std::sync::{Arc, Mutex};\n\n    #[derive(Clone)]\n    struct FixedClock {\n        now: DateTime\u003cUtc\u003e,\n    }\n\n    impl Clock for FixedClock {\n        fn now(\u0026self) -\u003e DateTime\u003cUtc\u003e {\n            self.now\n        }\n    }\n\n    #[derive(Clone, Default)]\n    struct RecordingRepository {\n        saved: Arc\u003cMutex\u003cVec\u003cNewMessage\u003e\u003e\u003e,\n        create_error: Arc\u003cMutex\u003cOption\u003cCoreError\u003e\u003e\u003e,\n    }\n\n    #[async_trait]\n    impl MessageRepository for RecordingRepository {\n        async fn list_latest(\n            \u0026self,\n            _before: Option\u003cDateTime\u003cUtc\u003e\u003e,\n            _limit: u64,\n        ) -\u003e CoreResult\u003cVec\u003cTimelineMessage\u003e\u003e {\n            Ok(Vec::new())\n        }\n\n        async fn create(\u0026self, input: NewMessage) -\u003e CoreResult\u003c()\u003e {\n            if let Some(error) = self\n                .create_error\n                .lock()\n                .expect(\"mutexのロックに失敗しない想定\")\n                .clone()\n            {\n                return Err(error);\n            }\n            self.saved\n                .lock()\n                .expect(\"mutexのロックに失敗しない想定\")\n                .push(input);\n            Ok(())\n        }\n    }\n\n    #[tokio::test]\n    async fn 正常入力なら保存して成功レスポンスを返す() {\n        let repository = RecordingRepository::default();\n        let usecase = PostMessageUseCase::new(\n            repository.clone(),\n            FixedClock {\n                now: Utc\n                    .with_ymd_and_hms(2026, 7, 1, 0, 0, 0)\n                    .single()\n                    .expect(\"固定時刻の生成に失敗しない想定\"),\n            },\n        );\n\n        let output = usecase\n            .execute(PostMessageInput {\n                user_id: Uuid::now_v7(),\n                user_name: \"taro\".to_string(),\n                body: \"こんにちは\".to_string(),\n                row_log: \"request-id=test\".to_string(),\n                is_from_user: true,\n            })\n            .await\n            .expect(\"正常系で失敗しない想定\");\n\n        assert_eq!(output.status, \"success\");\n        assert_eq!(output.message, \"メッセージを投稿しました\");\n        assert_eq!(\n            repository\n                .saved\n                .lock()\n                .expect(\"mutexのロックに失敗しない想定\")\n                .len(),\n            1\n        );\n    }\n\n    #[tokio::test]\n    async fn 本文が空ならバリデーションエラー() {\n        let repository     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/').map(decodeURIComponent);
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
</body>
</html>
