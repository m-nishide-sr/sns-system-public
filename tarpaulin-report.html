<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

ialize, ToSchema, PartialEq, Eq)]\npub struct TimelineMessageResponse {\n    /// 投稿者名。\n    pub user_name: String,\n    /// 投稿日時。\n    pub created_at: DateTime\u003cUtc\u003e,\n    /// 投稿本文。\n    pub body: String,\n    /// 利用者投稿かどうか。\n    pub is_from_user: bool,\n}\n\n/// メッセージ投稿リクエスト。\n#[derive(Debug, Clone, Serialize, Deserialize, ToSchema, PartialEq, Eq)]\npub struct CreateMessageRequest {\n    /// 投稿本文。\n    pub body: String,\n}\n\n/// メッセージ投稿レスポンス。\n#[derive(Debug, Clone, Serialize, Deserialize, ToSchema, PartialEq, Eq)]\npub struct CreateMessageResponse {\n    /// 処理ステータス。\n    pub status: String,\n    /// 応答メッセージ。\n    pub message: String,\n}\n\n/// エラーレスポンス。\n#[derive(Debug, Clone, Serialize, Deserialize, ToSchema, PartialEq, Eq)]\npub struct ErrorResponse {\n    /// エラー概要。\n    pub message: String,\n}\n\n/// タイムライン取得APIのOpenAPI定義。\n#[utoipa::path(\n    get,\n    path = \"/api/v1/timeline\",\n    params(\n        (\"before\" = Option\u003cString\u003e, Query, description = \"ISO8601形式の境界日時\")\n    ),\n    responses(\n        (status = 200, description = \"タイムライン取得成功\", body = [TimelineMessageResponse]),\n        (status = 400, description = \"不正なリクエスト\", body = ErrorResponse),\n        (status = 401, description = \"認証エラー\", body = ErrorResponse),\n        (status = 500, description = \"サーバーエラー\", body = ErrorResponse)\n    )\n)]\npub fn timeline_endpoint_doc() {}\n\n/// 投稿APIのOpenAPI定義。\n#[utoipa::path(\n    post,\n    path = \"/api/v1/message\",\n    request_body = CreateMessageRequest,\n    responses(\n        (status = 201, description = \"投稿成功\", body = CreateMessageResponse),\n        (status = 400, description = \"不正なリクエスト\", body = ErrorResponse),\n        (status = 401, description = \"認証エラー\", body = ErrorResponse),\n        (status = 500, description = \"サーバーエラー\", body = ErrorResponse)\n    ),\n    security(\n        (\"CognitoJwtAuth\" = [])\n    )\n)]\npub fn create_message_endpoint_doc() {}\n\n/// OpenAPIドキュメントのエントリポイント。\n#[derive(OpenApi)]\n#[openapi(\n    paths(timeline_endpoint_doc, create_message_endpoint_doc),\n    components(schemas(\n        TimelineMessageResponse,\n        CreateMessageRequest,\n        CreateMessageResponse,\n        ErrorResponse\n    )),\n    security(\n        (\"CognitoJwtAuth\" = [])\n    ),\n    modifiers(\u0026SecurityAddon)\n)]\npub struct ApiDoc;\n\n/// `CognitoJwtAuth` の詳細定義を設定する構造体\npub struct SecurityAddon;\n\nimpl Modify for SecurityAddon {\n    fn modify(\u0026self, openapi: \u0026mut utoipa::openapi::OpenApi) {\n        let components = openapi\n            .components\n            .as_mut()\n            .expect(\"componentsが存在する想定\");\n        components.add_security_scheme(\n            \"CognitoJwtAuth\",\n            SecurityScheme::Http(\n                HttpBuilder::new()\n                    .scheme(HttpAuthScheme::Bearer)\n                    .bearer_format(\"JWT\")\n                    .description(Some(\n                        \"Cognitoから発行されたIDトークンまたはアクセストークンを入力してください\",\n                    ))\n                    .build(),\n            ),\n        );\n    }\n}\n\n#[derive(Clone, Copy, Debug, Eq, PartialEq)]\n/// API Gateway の生イベントをユースケース単位へ振り分ける内部ルート種別。\nenum Route {\n    GetTimeline,\n    PostMessageNew,\n    MethodNotAllowed,\n    NotFound,\n}\n\n/// API Gateway のパスとメソッドから処理対象ルートを判定する。\nfn route_request(event: \u0026ApiGatewayV2httpRequest) -\u003e Route {\n    let path = event\n        .raw_path\n        .as_deref()\n        .or(event.request_context.http.path.as_deref())\n        .unwrap_or(\"\");\n\n    let method = event.request_context.http.method.as_str();\n\n    match path {\n        \"/api/v1/timeline\" =\u003e {\n            if method == \"GET\" {\n                Route::GetTimeline\n            } else {\n                Route::MethodNotAllowed\n            }\n        }\n        \"/api/v1/message\" =\u003e {\n            if method == \"POST\" {\n                Route::PostMessageNew\n            } else {\n                Route::MethodNotAllowed\n            }\n        }\n        _ =\u003e Route::NotFound,\n    }\n}\n\n/// API Gateway イベントから機微情報をマスクしたJSON文字列を生成する\nfn serde_to_sanitized_log_string(event: \u0026ApiGatewayV2httpRequest) -\u003e String {\n    let mut sanitized_event = event.clone();\n    let sensitive_keys = [\"authorization\", \"cookie\", \"set-cookie\", \"x-api-key\"];\n\n    for (key, value) in sanitized_event.headers.iter_mut() {\n        if sensitive_keys.contains(\u0026key.as_str()) {\n            *value = HeaderValue::from_static(\"[MASKED]\");\n        }\n    }\n\n    serde_json::to_string(\u0026sanitized_event).unwrap_or_else(|_| {\n        tracing::warn!(\"Failed to serialize API Gateway event for row_log\");\n        \"{}\".to_string()\n    })\n}\n\nfn extract_auth_info(event: \u0026ApiGatewayV2httpRequest) -\u003e Option\u003c(String, uuid::Uuid)\u003e {\n    let auth = event.request_context.authorizer.as_ref()?;\n    let jwt = auth.jwt.as_ref()?;\n\n    let email = jwt.claims.get(\"email\")?.to_string();\n    if email.is_empty() {\n        return None;\n    }\n\n    let cognito_sub = jwt.claims.get(\"sub\")?.to_string();\n    if cognito_sub.is_empty() {\n        return None;\n    }\n\n    match uuid::Uuid::parse_str(\u0026cognito_sub) {\n        Ok(cognito_sub) =\u003e Some((email, cognito_sub)),\n        Err(err) =\u003e {\n            tracing::warn!(\"Invalid cognito_sub in JWT claims: {}\", err);\n            None\n        }\n    }\n}\n\n/// Lambdaエントリポイントから呼び出されるHTTPハンドラ。\npub async fn function_handler(\n    db: \u0026DatabaseConnection,\n    event: LambdaEvent\u003cApiGatewayV2httpRequest\u003e,\n) -\u003e Result\u003cApiGatewayV2httpResponse, Error\u003e {\n    let (event, _context) = event.into_parts();\n    let route = route_request(\u0026event);\n\n    let row_log = serde_to_sanitized_log_string(\u0026event);\n    let repository = SeaOrmMessageRepository::new(db.clone());\n    let auth_info = extract_auth_info(\u0026event);\n\n    if auth_info.is_none() {\n        return json_response(\n            401,\n            \u0026ErrorResponse {\n                message: \"Unauthorized\".to_string(),\n            },\n        );\n    }\n\n    match route {\n        Route::GetTimeline =\u003e {\n            let before = match parse_before(event.query_string_parameters.first(\"before\")) {\n                Ok(before) =\u003e before,\n                Err(error) =\u003e return Ok(error_response(error)),\n            };\n\n            let usecase = GetTimelineUseCase::new(repository);\n            let output = match usecase\n                .execute(GetTimelineInput { before, limit: 50 })\n                .await\n            {\n                Ok(output) =\u003e output,\n                Err(error) =\u003e return Ok(error_response(error)),\n            };\n\n            let response: Vec\u003cTimelineMessageResponse\u003e = output\n                .items\n                .into_iter()\n                .map(TimelineMessageResponse::from)\n                .collect();\n\n            json_response(200, \u0026response)\n        }\n        Route::PostMessageNew =\u003e {\n            let (email, cognito_sub) = match auth_info {\n                Some((email, cognito_sub)) =\u003e (email, cognito_sub),\n                None =\u003e {\n                    return json_response(\n                        401,\n                        \u0026ErrorResponse {\n                            message: \"Unauthorized\".to_string(),\n                        },\n                    );\n                }\n            };\n\n            let raw_body = match event.body {\n                Some(body) =\u003e body,\n                None =\u003e {\n                    return json_response(\n                        400,\n                        \u0026ErrorResponse {\n                            message: \"Bad Request\".to_string(),\n                        },\n                    );\n                }\n            };\n\n            let request: CreateMessageRequest = match serde_json::from_str(\u0026raw_body) {\n                Ok(value) =\u003e value,\n                Err(_) =\u003e {\n                    return json_response(\n                        400,\n                        \u0026ErrorResponse {\n                            message: \"Bad Request\".to_string(),\n                        },\n                    );\n                }\n            };\n            let Some(name) = email.split('@').next() else {\n                return json_response(\n                    400,\n                    \u0026ErrorResponse {\n                        message: \"登録しているemailアドレスが不正です\".to_string(),\n                    },\n                );\n            };\n            let user_name = name.to_string();\n\n            let usecase = PostMessageUseCase::new(repository, SystemClock);\n            let output = match usecase\n                .execute(PostMessageInput {\n                    user_id: cognito_sub,\n                    user_name,\n                    body: request.body,\n                    row_log,\n                    is_from_user: true,\n                })\n                .await\n            {\n                Ok(output) =\u003e output,\n                Err(error) =\u003e return Ok(error_response(error)),\n            };\n\n            json_response(\n                201,\n                \u0026CreateMessageResponse {\n                    status: output.status,\n                    message: output.message,\n                },\n            )\n        }\n        Route::NotFound =\u003e json_response(\n            404,\n            \u0026ErrorResponse {\n                message: \"not found\".to_string(),\n            },\n        ),\n        Route::MethodNotAllowed =\u003e json_response(\n            405,\n            \u0026ErrorResponse {\n                message: \"method not allowed\".to_string(),\n            },\n        ),\n    }\n}\n\n/// `before` クエリ文字列を ISO8601 日時として検証し、UTC に正規化する。\nfn parse_before(before: Option\u003c\u0026str\u003e) -\u003e CoreResult\u003cOption\u003cDateTime\u003cUtc\u003e\u003e\u003e {\n    before\n        .map(|v| {\n            DateTime::parse_from_rfc3339(v)\n                .map(|dt| dt.with_timezone(\u0026Utc))\n                .map_err(|_| {\n                    CoreError::Validation(\"beforeはISO8601形式で指定してください\".to_string())\n                })\n        })\n        .transpose()\n}\n\n/// 指定したステータスコードと JSON ペイロードから API Gateway 応答を組み立てる。\nfn json_response\u003cT: Serialize\u003e(\n    status: i64,\n    payload: \u0026T,\n) -\u003e Result\u003cApiGatewayV2httpResponse, Error\u003e {\n    let body = serde_json::to_string(payload)?;\n    let headers = HeaderMap::from_iter(vec![(\n        HeaderName::from_static(\"content-type\"),\n        \"application/json\"\n            .parse()\n            .expect(\"固定値ヘッダーの変換に失敗しない想定\"),\n    )]);\n\n    let mut response: ApiGatewayV2httpResponse = ApiGatewayV2httpResponse::default();\n    response.body = Some(Body::Text(body));\n    response.status_code = status;\n    response.headers = headers;\n    Ok(response)\n}\n\n/// 共通エラー型を HTTP ステータスと公開用 JSON ボディへ変換する。\nfn error_response(error: CoreError) -\u003e ApiGatewayV2httpResponse {\n    let (status, body) = match error {\n        CoreError::Validation(_) =\u003e (400, r#\"{\"message\":\"Bad Request\"}\"#.to_string()),\n        CoreError::Unauthorized =\u003e (401, r#\"{\"message\":\"Unauthorized\"}\"#.to_string()),\n        CoreError::Infrastructure(_) =\u003e (500, r#\"{\"message\":\"Internal Server Error\"}\"#.to_string()),\n    };\n\n    let mut response: ApiGatewayV2httpResponse = ApiGatewayV2httpResponse::default();\n    response.body = Some(Body::Text(body));\n    response.headers = HeaderMap::from_iter(vec![(\n        HeaderName::from_static(\"content-type\"),\n        \"application/json\"\n            .parse()\n            .expect(\"固定値ヘッダーの変換に失敗しない想定\"),\n    )]);\n    response.status_code = status;\n    response\n}\n\nimpl From\u003cTimelineItem\u003e for TimelineMessageResponse {\n    fn from(value: TimelineItem) -\u003e Self {\n        Self {\n            user_name: value.user_name,\n            created_at: value.created_at,\n            body: value.body,\n            is_from_user: value.is_from_user,\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use aws_lambda_events::http::Method;\n    use chrono::TimeZone;\n    use utoipa::OpenApi;\n\n    fn request_with(path: \u0026str, method: Method) -\u003e ApiGatewayV2httpRequest {\n        let mut req = ApiGatewayV2httpRequest::default();\n        req.raw_path = Some(path.to_string());\n        req.request_context.http.method = method;\n        req\n    }\n\n    #[test]\n    fn route_requestは_get_timelineを判定できる() {\n        let req = request_with(\"/api/v1/timeline\", Method::GET);\n        assert_eq!(route_request(\u0026req), Route::GetTimeline);\n    }\n\n    #[test]\n    fn route_requestは_messageの不正メソッドを405扱いにする() {\n        let req = request_with(\"/api/v1/message\", Method::GET);\n        assert_eq!(route_request(\u0026req), Route::MethodNotAllowed);\n    }\n\n    #[test]\n    fn route_requestは未知パスを_not_foundにする() {\n        let req = request_with(\"/api/unknown\", Method::GET);\n        assert_eq!(route_request(\u0026req), Route::NotFound);\n    }\n\n    #[test]\n    fn parse_beforeは未指定で_noneを返す() {\n        assert_eq!(parse_before(None).unwrap(), None);\n    }\n\n    #[test]\n    fn parse_beforeは正常な_rfc3339を_utcへ変換する() {\n        let actual = parse_before(Some(\"2026-07-01T00:00:00+09:00\")).unwrap();\n        let expected = Utc\n            .with_ymd_and_hms(2026, 6, 30, 15, 0, 0)\n            .single()\n            .expect(\"固定時刻の生成に失敗しない想定\");\n        assert_eq!(actual, Some(expected));\n    }\n\n    #[test]\n    fn parse_beforeは不正値で_validationエラーを返す() {\n        let err = parse_before(Some(\"invalid\")).expect_err(\"不正な日時はエラー想定\");\n        assert!(matches!(err, CoreError::Validation(_)));\n    }\n\n    #[test]\n    fn serde_to_sanitized_log_stringは機微ヘッダーをマスクする() {\n        let mut req = request_with(\"/api/v1/message\", Method::POST);\n        req.headers.insert(\n            HeaderName::from_static(\"authorization\"),\n            HeaderValue::from_static(\"******\"),\n        );\n        req.headers.insert(\n            HeaderName::from_static(\"x-api-key\"),\n            HeaderValue::from_static(\"secret\"),\n        );\n        req.headers.insert(\n            HeaderName::from_static(\"x-trace-id\"),\n            HeaderValue::from_static(\"trace-1\"),\n        );\n\n        let serialized = serde_to_sanitized_log_string(\u0026req);\n        let value: serde_json::Value =\n            serde_json::from_str(\u0026serialized).expect(\"JSON化されたログ文字列の想定\");\n\n        assert_eq!(value[\"headers\"][\"authorization\"], \"[MASKED]\");\n        assert_eq!(value[\"headers\"][\"x-api-key\"], \"[MASKED]\");\n        assert_eq!(value[\"headers\"][\"x-trace-id\"], \"trace-1\");\n    }\n\n    #[test]\n    fn json_responseは_jsonヘッダーと本文を返す() {\n        let response = json_response(\n            200,\n            \u0026ErrorResponse {\n                message: \"ok\".to_string(),\n            },\n        )\n        .expect(\"正常系で失敗しない想定\");\n\n        assert_eq!(response.status_code, 200);\n        assert_eq!(\n            response\n                .headers\n                .get(\"content-type\")\n                .expect(\"content-typeが存在する想定\"),\n            \"application/json\"\n        );\n        assert_eq!(\n            response.body,\n            Some(Body::Text(r#\"{\"message\":\"ok\"}\"#.to_string()))\n        );\n    }\n\n    #[test]\n    fn error_responseは_validationを400へ変換する() {\n        let response = error_response(CoreError::Validation(\"x\".to_string()));\n        assert_eq!(response.status_code, 400);\n    }\n\n    #[test]\n    fn error_responseは_unauthorizedを401へ変換する() {\n        let response = error_response(CoreError::Unauthorized);\n        assert_eq!(response.status_code, 401);\n    }\n\n    #[tes butes\n        .get(\"email\")\n        .map(String::as_str)\n        .ok_or_else(|| -\u003e Error {\n            String::from(\"リクエストにメールアドレスが含まれていません\").into()\n        })?;\n\n    if is_allowed_domain(email, allowed_domains)? {\n        Ok(event.payload)\n    } else {\n        let domain = email.rsplit_once('@').map(|(_, d)| d).unwrap_or(\"\");\n        Err(format!(\"メールアドレスのドメイン '{}' は許可されていません\", domain).into())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    use lambda_runtime::Context;\n    use serde_json::json;\n\n    #[test]\n    fn 許可ドメインと一致する場合はtrue() {\n        assert!(is_allowed_domain(\"user@example.com\", \"example.com\").unwrap());\n    }\n\n    #[test]\n    fn 許可ドメインと一致しない場合はfalse() {\n        assert!(!is_allowed_domain(\"user@other.com\", \"example.com\").unwrap());\n    }\n\n    #[test]\n    fn カンマ区切りの複数ドメインの先頭に一致する場合はtrue() {\n        assert!(is_allowed_domain(\"user@example.com\", \"example.com,other.com\").unwrap());\n    }\n\n    #[test]\n    fn カンマ区切りの複数ドメインの末尾に一致する場合はtrue() {\n        assert!(is_allowed_domain(\"user@other.com\", \"example.com,other.com\").unwrap());\n    }\n\n    #[test]\n    fn スペースを含む複数ドメインに一致する場合はtrue() {\n        assert!(is_allowed_domain(\"user@other.com\", \"example.com, other.com\").unwrap());\n    }\n\n    #[test]\n    fn 不正なメールアドレス形式の場合はエラー() {\n        assert!(is_allowed_domain(\"invalid-email\", \"example.com\").is_err());\n    }\n\n    #[tokio::test]\n    async fn handlerは型付きイベントからemailを取得できる() {\n        let event: CognitoEventUserPoolsPreSignup = serde_json::from_value(json!({\n            \"version\": \"1\",\n            \"triggerSource\": \"PreSignUp_SignUp\",\n            \"region\": \"ap-northeast-3\",\n            \"userPoolId\": \"ap-northeast-3_example\",\n            \"userName\": \"user@example.com\",\n            \"callerContext\": {\n                \"awsSdkVersion\": \"aws-sdk-js-3.0.0\",\n                \"clientId\": \"example-client-id\"\n            },\n            \"request\": {\n                \"userAttributes\": {\n                    \"email\": \"user@example.com\"\n                },\n                \"validationData\": {},\n                \"clientMetadata\": {}\n            },\n            \"response\": {\n                \"autoConfirmUser\": false,\n                \"autoVerifyEmail\": false,\n                \"autoVerifyPhone\": false\n            }\n        }))\n        .unwrap();\n\n        let result = function_handler(LambdaEvent::new(event, Context::default()), \"example.com\");\n\n        assert!(result.is_ok());\n    }\n\n    #[tokio::test]\n    async fn handlerはemail属性が無い場合エラー() {\n        let event: CognitoEventUserPoolsPreSignup = serde_json::from_value(json!({\n            \"version\": \"1\",\n            \"triggerSource\": \"PreSignUp_SignUp\",\n            \"region\": \"ap-northeast-3\",\n            \"userPoolId\": \"ap-northeast-3_example\",\n            \"userName\": \"user@example.com\",\n            \"callerContext\": {\n                \"awsSdkVersion\": \"aws-sdk-js-3.0.0\",\n                \"clientId\": \"example-client-id\"\n            },\n            \"request\": {\n                \"userAttributes\": {},\n                \"validationData\": {},\n                \"clientMetadata\": {}\n            },\n            \"response\": {\n                \"autoConfirmUser\": false,\n                \"autoVerifyEmail\": false,\n                \"autoVerifyPhone\": false\n            }\n        }))\n        .unwrap();\n\n        let result = function_handler(LambdaEvent::new(event, Context::default()), \"example.com\");\n\n        assert!(result.is_err());\n    }\n\n    #[tokio::test]\n    async fn handlerは許可しているドメインのemailで無い場合エラー() {\n        let event: CognitoEventUserPoolsPreSignup = serde_json::from_value(json!({\n            \"version\": \"1\",\n            \"triggerSource\": \"PreSignUp_SignUp\",\n            \"region\": \"ap-northeast-3\",\n            \"userPoolId\": \"ap-northeast-3_example\",\n            \"userName\": \"user@example.com\",\n            \"callerContext\": {\n                \"awsSdkVersion\": \"aws-sdk-js-3.0.0\",\n                \"clientId\": \"example-client-id\"\n            },\n            \"request\": {\n                \"userAttributes\": {\n                    \"email\": \"user@notallowed.com\"\n                },\n                \"validationData\": {},\n                \"clientMetadata\": {}\n            },\n            \"response\": {\n                \"autoConfirmUser\": false,\n                \"autoVerifyEmail\": false,\n                \"autoVerifyPhone\": false\n            }\n        }))\n        .unwrap();\n\n        let result = function_handler(LambdaEvent::new(event, Context::default()), \"example.com\");\n\n        assert!(result.is_err());\n    }\n}\n","traces":[{"line":5,"address":[6271648,6272050,6272056],"length":1,"stats":{"Line":6}},{"line":6,"address":[6271707,6271811],"length":1,"stats":{"Line":8}},{"line":7,"address":[6272932],"length":1,"stats":{"Line":1}},{"line":9,"address":[6271894],"length":1,"stats":{"Line":5}},{"line":11,"address":[6272010],"length":1,"stats":{"Line":5}},{"line":12,"address":[6271909],"length":1,"stats":{"Line":5}},{"line":13,"address":[6271990],"length":1,"stats":{"Line":15}},{"line":17,"address":[6270624,6271607],"length":1,"stats":{"Line":1}},{"line":21,"address":[6270898,6270840,6271640,6270683],"length":1,"stats":{"Line":4}},{"line":26,"address":[6270778],"length":1,"stats":{"Line":1}},{"line":27,"address":[6270817],"length":1,"stats":{"Line":2}},{"line":28,"address":[6272868],"length":1,"stats":{"Line":1}},{"line":31,"address":[6270975,6271626,6271204],"length":1,"stats":{"Line":3}},{"line":32,"address":[6271148],"length":1,"stats":{"Line":1}},{"line":34,"address":[6271136,6271217],"length":1,"stats":{"Line":3}},{"line":35,"address":[6271306],"length":1,"stats":{"Line":1}}],"covered":16,"coverable":16},{"path":["/","workspaces","sns-system-public","auth","PreSignUpFunction","src","lib.rs"],"content":"//! Cognito Pre Sign-Up トリガーでメールドメイン制約を適用する Lambda 関数。\n\nmod app;\n\npub use app::function_handler;\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","sns-system-public","auth","PreSignUpFunction","src","main.rs"],"content":"use core_domain::AuthRepository;\nuse core_infrastructure_lambda::LambdaAuthRepository;\nuse lambda_runtime::Error;\nuse std::env;\nuse std::sync::OnceLock;\n\nstatic ALLOWED_EMAIL_DOMAINS: OnceLock\u003cString\u003e = OnceLock::new();\n\nstatic EXECUTOR: OnceLock\u003cBox\u003cdyn AuthRepository\u003e\u003e = OnceLock::new();\n\n#[tokio::main(flavor = \"current_thread\")]\n/// Lambda ランタイムへ型付きハンドラを登録するエントリーポイント。\nasync fn main() -\u003e Result\u003c(), Error\u003e {\n    executor().await\n}\n\n/// Lambda 処理の実態。\nasync fn executor() -\u003e Result\u003c(), Error\u003e {\n    // get_or_init のクロージャは String を返す必要があるため、内部で expect を使う\n    ALLOWED_EMAIL_DOMAINS.get_or_init(|| {\n        env::var(\"ALLOWED_EMAIL_DOMAINS\")\n            // 環境変数が未設定の場合はデプロイ設定の問題であるため、明示的なエラーを返す\n            .expect(\"ALLOWED_EMAIL_DOMAINS 環境変数が設定されていません\")\n    });\n\n    EXECUTOR.get_or_init(|| {\n        Box::new(LambdaAuthRepository::new(\n            ALLOWED_EMAIL_DOMAINS.get().unwrap().clone(),\n        ))\n    });\n\n    EXECUTOR.get().unwrap().execute().await\n}\n\n#[cfg(test)]\nmod tests {\n    use std::{fmt::Debug, pin::Pin};\n\n    use super::*;\n\n    /// メールアドレスのドメイン部が許可リストに含まれているか検証する。\n    fn is_allowed_domain(\n        email: \u0026str,\n        allowed_domains: \u0026str,\n    ) -\u003e Result\u003cbool, lambda_runtime::Error\u003e {\n        let (_, domain) = email\n            .rsplit_once('@')\n            .ok_or_else(|| -\u003e lambda_runtime::Error {\n                String::from(\"メールアドレスの形式が不正です\").into()\n            })?;\n        let domain = domain.to_ascii_lowercase();\n\n        Ok(allowed_domains\n            .split(',')\n            .any(|d| d.trim().to_ascii_lowercase() == domain))\n    }\n\n    /// Cognito の Pre Sign-Up トリガー要求を検証し、そのまま返却する。\n    fn function_handler(email: \u0026str, allowed_domains: \u0026str) -\u003e Result\u003c(), lambda_runtime::Error\u003e {\n        if is_allowed_domain(email, allowed_domains)? {\n            Ok(())\n        } else {\n            let domain = email.rsplit_once('@').map(|(_, d)| d).unwrap_or(\"\");\n            Err(format!(\"メールアドレスのドメイン '{}' は許可されていません\", domain).into())\n        }\n    }\n\n    /// Lambdaを利用したメッセージRepository実装。\n    #[derive(Debug)]\n    pub struct MockAuthRepository\u003cT\u003e\n    where\n        T: AsRef\u003cstr\u003e + Send + Sync + Debug,\n    {\n        allowed_domains: T,\n    }\n\n    impl\u003cT\u003e MockAuthRepository\u003cT\u003e\n    where\n        T: AsRef\u003cstr\u003e + Send + Sync + Debug,\n    {\n        /// DB接続を受け取りRepositoryを生成する。\n        pub fn new(allowed_domains: T) -\u003e Self {\n            Self { allowed_domains }\n        }\n    }\n\n    impl\u003cT\u003e AuthRepository for MockAuthRepository\u003cT\u003e\n    where\n        T: AsRef\u003cstr\u003e + Send + Sync + Debug,\n    {\n        // 戻り値の Future に引数のライフタイム（'_）を関連付ける\n        fn execute(\n            \u0026self, // selfを消費(move)せず参照で受け取る場合\n        ) -\u003e Pin\u003c\n            Box\u003c\n                dyn Future\u003cOutput = Result\u003c(), Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e\u003e\n                    + Send\n                    + '_,\n            \u003e,\n        \u003e {\n            let allowed_domains = self.allowed_domains.as_ref();\n            Box::pin(async move { function_handler(\"test@example.com\", allowed_domains) })\n        }\n    }\n    #[tokio::test]\n    async fn mainのロジックが成功すること() {\n        // 環境変数のモックなどが必要な場合はここで行う\n        ALLOWED_EMAIL_DOMAINS\n            .set(\"example.com\".to_string())\n            .unwrap();\n\n        EXECUTOR\n            .set(Box::new(MockAuthRepository::new(\n                ALLOWED_EMAIL_DOMAINS.get().unwrap().clone(),\n            )))\n            .unwrap();\n\n        // #[tokio::main] を経由せず、ロジックを直接テストする\n        let result = executor().await;\n\n        // lambda_runtime::run はテスト環境だと別のエラー（接続失敗など）に\n        // なる可能性があるため、アサーションは実際の検証目的に合わせて調整してください\n        assert!(result.is_ok());\n    }\n}\n","traces":[{"line":13,"address":[6666480,6666915,6666909],"length":1,"stats":{"Line":0}},{"line":14,"address":[6373984,6374079,6374165,6374018],"length":1,"stats":{"Line":0}},{"line":18,"address":[6374473,6374419,6374938,6374515,6374384,6374707],"length":1,"stats":{"Line":4}},{"line":20,"address":[6374459,6375040],"length":1,"stats":{"Line":1}},{"line":21,"address":[6375053],"length":1,"stats":{"Line":0}},{"line":23,"address":[6375080],"length":1,"stats":{"Line":0}},{"line":26,"address":[6374554,6374944],"length":1,"stats":{"Line":1}},{"line":27,"address":[6375010],"length":1,"stats":{"Line":0}},{"line":28,"address":[6374948],"length":1,"stats":{"Line":0}},{"line":32,"address":[6374738,6374500,6374568],"length":1,"stats":{"Line":1}}],"covered":4,"coverable":10},{"path":["/","workspaces","sns-system-public","auth","PreSignUpFunction","target","debug","build","serde-ce00eb281fe28577","out","private.rs"],"content":"#[doc(hidden)]\npub mod __private228 {\n    #[doc(hidden)]\n    pub use crate::private::*;\n}\nuse serde_core::__private228 as serde_core_private;\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","sns-system-public","auth","PreSignUpFunction","target","debug","build","serde_core-90e075728adfef8c","out","private.rs"],"content":"#[doc(hidden)]\npub mod __private228 {\n    #[doc(hidden)]\n    pub use crate::private::*;\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","sns-system-public","core","common","src","clock.rs"],"content":"use chrono::{DateTime, Utc};\n\n/// 現在時刻を取得するための抽象。\n///\n/// ユースケースがシステム時刻へ直接依存するとテスト時の再現性が下がるため、\n/// 本トレイトを介して差し替え可能にする。\npub trait Clock: Send + Sync {\n    /// 現在のUTC時刻を返す。\n    fn now(\u0026self) -\u003e DateTime\u003cUtc\u003e;\n}\n\n/// 実運用で利用するシステム時計。\n#[derive(Debug, Clone, Copy, Default)]\npub struct SystemClock;\n\nimpl Clock for SystemClock {\n    fn now(\u0026self) -\u003e DateTime\u003cUtc\u003e {\n        Utc::now()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use chrono::Duration;\n\n    #[test]\n    fn system_clockは現在時刻に近い値を返す() {\n        let before = Utc::now();\n        let now = SystemClock.now();\n        let after = Utc::now();\n\n        assert!(now \u003e= before - Duration::seconds(1));\n        assert!(now \u003c= after + Duration::seconds(1));\n    }\n}\n","traces":[{"line":17,"address":[706704],"length":1,"stats":{"Line":1}},{"line":18,"address":[706721],"length":1,"stats":{"Line":1}}],"covered":2,"coverable":2},{"path":["/","workspaces","sns-system-public","core","common","src","error.rs"],"content":"use thiserror::Error;\n\n/// コア層全体で共有するエラー。\n///\n/// 外部技術依存の詳細は文字列へ集約し、呼び出し元ではカテゴリごとに\n/// HTTPレスポンスや再試行制御へマッピングできるようにする。\n#[derive(Debug, Error, Clone, PartialEq, Eq)]\npub enum CoreError {\n    /// 入力値やドメイン制約に反したエラー。\n    #[error(\"入力値が不正です: {0}\")]\n    Validation(String),\n    /// 認証情報が不足または不正なエラー。\n    #[error(\"認証に失敗しました\")]\n    Unauthorized,\n    /// DBやネットワーク等の外部I/O起因のエラー。\n    #[error(\"インフラ層でエラーが発生しました: {0}\")]\n    Infrastructure(String),\n}\n\n/// コア層の戻り値型。\npub type CoreResult\u003cT\u003e = Result\u003cT, CoreError\u003e;\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn validationはメッセージを保持する() {\n        let error = CoreError::Validation(\"invalid\".to_string());\n        assert_eq!(format!(\"{error}\"), \"入力値が不正です: invalid\".to_string());\n    }\n\n    #[test]\n    fn unauthorizedは固定メッセージになる() {\n        let error = CoreError::Unauthorized;\n        assert_eq!(format!(\"{error}\"), \"認証に失敗しました\".to_string());\n    }\n\n    #[test]\n    fn infrastructureは詳細メッセージを含む() {\n        let error = CoreError::Infrastructure(\"db timeout\".to_string());\n        assert_eq!(\n            format!(\"{error}\"),\n            \"インフラ層でエラーが発生しました: db timeout\".to_string()\n        );\n    }\n\n    #[test]\n    fn core_result型エイリアスが利用できる() {\n        let result: CoreResult\u003ci32\u003e = Ok(1);\n        assert_eq!(result, Ok(1));\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","sns-system-public","core","common","src","lib.rs"],"content":"//! 共通的で技術非依存なユーティリティを提供するクレート。\n//!\n//! この層にはビジネスルールを置かず、各レイヤーで共有しても\n//! ドメイン知識が汚染されない最小限の基盤要素だけを保持する。\n\npub mod clock;\npub mod error;\n\npub use clock::{Clock, SystemClock};\npub use error::{CoreError, CoreResult};\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn 公開re_exportを利用できる() {\n        let now = SystemClock.now();\n        let result: CoreResult\u003ci32\u003e = Ok(1);\n\n        assert!(now.timestamp() \u003e 0);\n        assert_eq!(result, Ok(1));\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","sns-system-public","core","domain","src","auth.rs"],"content":"use std::fmt::Debug;\nuse std::future::Future;\nuse std::pin::Pin;\n\n// ビジネスルールに基づいた、ドメイン層専用のエラー型\n#[derive(Debug)]\npub enum DomainError {\n    InvalidInput(String),\n    NetworkError(String),\n}\n\n// 外部の仕様に依存しない純粋なドメインモデル（引数と戻り値）\npub struct PreSignUpInput {\n    pub username: String,\n    pub email: String,\n}\n\npub struct PreSignUpOutput {\n    pub is_success: bool,\n    pub message: String,\n}\n\n/// 1. 複雑なエラー型とFuture型をエイリアス（type）として切り出す\npub type AuthError = Box\u003cdyn std::error::Error + Send + Sync\u003e;\npub type BoxFuture\u003c'a, T\u003e = Pin\u003cBox\u003cdyn Future\u003cOutput = T\u003e + Send + 'a\u003e\u003e;\n\n/// ドメイン層が定義する「インターフェース」（依存性逆転の原則）\n///\n/// ユースケースは本traitのみに依存し、Lambdaを知らない状態を維持する。\npub trait AuthRepository: Send + Sync + Debug {\n    fn execute(\u0026self) -\u003e BoxFuture\u003c'_, Result\u003c(), AuthError\u003e\u003e;\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","sns-system-public","core","domain","src","lib.rs"],"content":"//! ドメイン層の公開API。\n//!\n//! ここでは業務上の不変条件を型として表現し、\n//! 不正状態をコンパイル時・生成時の両方で抑止する。\n\npub mod auth;\npub mod message;\npub mod repository;\n\npub use auth::{AuthRepository, DomainError, PreSignUpInput, PreSignUpOutput};\npub use message::{MessageBody, NewMessage, TimelineMessage, UserId, UserName};\npub use repository::MessageRepository;\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use uuid::Uuid;\n\n    #[test]\n    fn 公開re_exportを利用できる() {\n        let body = MessageBody::new(\"hello\").expect(\"正常系で失敗しない想定\");\n        let user_name = UserName::new(\"taro\").expect(\"正常系で失敗しない想定\");\n        let user_id = UserId::new(Uuid::now_v7());\n\n        assert_eq!(body.as_str(), \"hello\");\n        assert_eq!(user_name.as_str(), \"taro\");\n        assert_ne!(user_id.into_inner(), Uuid::nil());\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","sns-system-public","core","domain","src","message.rs"],"content":"use chrono::{DateTime, Utc};\nuse core_common::{CoreError, CoreResult};\nuse serde::{Deserialize, Serialize};\nuse uuid::Uuid;\n\nconst MAX_BODY_LENGTH: usize = 500;\nconst MAX_USER_NAME_LENGTH: usize = 64;\n\n/// メッセージ本文を表す値オブジェクト。\n///\n/// 空文字列や過度に長い本文は保存前に拒否し、\n/// DB整合性エラーではなく業務エラーとして扱う。\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct MessageBody(String);\n\nimpl MessageBody {\n    /// 業務制約を満たす本文を生成する。\n    pub fn new(value: impl Into\u003cString\u003e) -\u003e CoreResult\u003cSelf\u003e {\n        let value = value.into();\n        let trimmed = value.trim();\n\n        if trimmed.is_empty() {\n            return Err(CoreError::Validation(\"本文は必須です\".to_string()));\n        }\n\n        if trimmed.chars().count() \u003e MAX_BODY_LENGTH {\n            return Err(CoreError::Validation(format!(\n                \"本文は{MAX_BODY_LENGTH}文字以下で入力してください\"\n            )));\n        }\n\n        Ok(Self(trimmed.to_string()))\n    }\n\n    /// 文字列参照を返す。\n    pub fn as_str(\u0026self) -\u003e \u0026str {\n        \u0026self.0\n    }\n}\n\n/// 投稿者名を表す値オブジェクト。\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct UserName(String);\n\nimpl UserName {\n    /// 妥当な投稿者名を生成する。\n    pub fn new(value: impl Into\u003cString\u003e) -\u003e CoreResult\u003cSelf\u003e {\n        let value = value.into();\n        let trimmed = value.trim();\n        if trimmed.is_empty() {\n            return Err(CoreError::Validation(\"ユーザー名は必須です\".to_string()));\n        }\n        if trimmed.chars().count() \u003e MAX_USER_NAME_LENGTH {\n            return Err(CoreError::Validation(format!(\n                \"ユーザー名は{MAX_USER_NAME_LENGTH}文字以下で入力してください\"\n            )));\n        }\n\n        Ok(Self(trimmed.to_string()))\n    }\n\n    /// 文字列参照を返す。\n    pub fn as_str(\u0026self) -\u003e \u0026str {\n        \u0026self.0\n    }\n}\n\n/// 認証済みユーザーID。\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash, Serialize, Deserialize)]\npub struct UserId(Uuid);\n\nimpl UserId {\n    /// UUIDからユーザーIDを作成する。\n    pub fn new(value: Uuid) -\u003e Self {\n        Self(value)\n    }\n\n    /// 生のUUIDを返す。\n    pub fn into_inner(self) -\u003e Uuid {\n        self.0\n    }\n}\n\n/// タイムライン表示用のドメインモデル。\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct TimelineMessage {\n    /// 投稿者名。\n    pub user_name: String,\n    /// 投稿日時(UTC)。\n    pub created_at: DateTime\u003cUtc\u003e,\n    /// 本文。\n    pub body: String,\n    /// ユーザー投稿かどうか。\n    pub is_from_user: bool,\n}\n\n/// 新規メッセージ作成時に必要なドメイン入力。\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct NewMessage {\n    /// 投稿者名。\n    pub user_name: UserName,\n    /// Cognitoのsub。\n    pub user_id: UserId,\n    /// 本文。\n    pub body: MessageBody,\n    /// 作成時刻。\n    pub created_at: DateTime\u003cUtc\u003e,\n    /// ユーザー投稿かどうか。\n    pub is_from_user: bool,\n    /// 障害調査用の生ログ。\n    pub row_log: String,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn 本文が空文字ならエラー() {\n        let result = MessageBody::new(\"   \");\n        assert!(matches!(result, Err(CoreError::Validation(_))));\n    }\n\n    #[test]\n    fn 本文が上限超過ならエラー() {\n        let body = \"あ\".repeat(501);\n        let result = MessageBody::new(body);\n        assert!(matches!(result, Err(CoreError::Validation(_))));\n    }\n\n    #[test]\n    fn ユーザー名が空文字ならエラー() {\n        let result = UserName::new(\" \");\n        assert!(matches!(result, Err(CoreError::Validation(_))));\n    }\n\n    #[test]\n    fn 正常な本文は前後空白を除去して保持() {\n        let result = MessageBody::new(\"  テスト  \").expect(\"正常系で失敗しない想定\");\n        assert_eq!(result.as_str(), \"テスト\");\n    }\n\n    #[test]\n    fn 正常なユーザー名は前後空白を除去して保持() {\n        let result = UserName::new(\"  taro  \").expect(\"正常系で失敗しない想定\");\n        assert_eq!(result.as_str(), \"taro\");\n    }\n\n    #[test]\n    fn ユーザー名が上限超過ならエラー() {\n        let name = \"a\".repeat(65);\n        let result = UserName::new(name);\n        assert!(matches!(result, Err(CoreError::Validation(_))));\n    }\n\n    #[test]\n    fn user_idはuuidを保持できる() {\n        let id = Uuid::now_v7();\n        let user_id = UserId::new(id);\n        assert_eq!(user_id.into_inner(), id);\n    }\n}\n","traces":[{"line":18,"address":[1920160,1921000,1921024,1921006,1921875],"length":1,"stats":{"Line":7}},{"line":19,"address":[16742113],"length":1,"stats":{"Line":5}},{"line":20,"address":[46627529,46627458],"length":1,"stats":{"Line":13}},{"line":22,"address":[46627588],"length":1,"stats":{"Line":7}},{"line":23,"address":[1921280,1921763,1920405,1920888],"length":1,"stats":{"Line":4}},{"line":26,"address":[1986968,1986911],"length":1,"stats":{"Line":10}},{"line":27,"address":[16554435,16554278],"length":1,"stats":{"Line":2}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[22589587,22589645,22590526,22590468],"length":1,"stats":{"Line":7}},{"line":36,"address":[48696224],"length":1,"stats":{"Line":2}},{"line":37,"address":[78496677],"length":1,"stats":{"Line":2}},{"line":47,"address":[46629137,46628272],"length":1,"stats": u003e,\n            _limit: u64,\n        ) -\u003e CoreResult\u003cVec\u003cTimelineMessage\u003e\u003e {\n            Ok(vec![TimelineMessage {\n                user_name: \"taro\".to_string(),\n                created_at: Utc::now(),\n                body: \"hello\".to_string(),\n                is_from_user: true,\n            }])\n        }\n\n        async fn create(\u0026self, _input: NewMessage) -\u003e CoreResult\u003c()\u003e {\n            Ok(())\n        }\n    }\n\n    #[tokio::test]\n    async fn trait実装経由で一覧取得できる() {\n        let repo = InMemoryRepository;\n        let messages = repo\n            .list_latest(None, 10)\n            .await\n            .expect(\"正常系で失敗しない想定\");\n        assert_eq!(messages.len(), 1);\n    }\n\n    #[tokio::test]\n    async fn trait実装経由で作成できる() {\n        let repo = InMemoryRepository;\n        let result = repo\n            .create(NewMessage {\n                user_name: UserName::new(\"taro\").expect(\"正常系で失敗しない想定\"),\n                user_id: UserId::new(Uuid::now_v7()),\n                body: MessageBody::new(\"hello\").expect(\"正常系で失敗しない想定\"),\n                created_at: Utc::now(),\n                is_from_user: true,\n                row_log: \"{}\".to_string(),\n            })\n            .await;\n\n        assert!(result.is_ok());\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","sns-system-public","core","infrastructure","db","src","db.rs"],"content":"use crate::db_dsql::{AuroraDSQLConnectionInfo, create_db_dsql};\nuse crate::db_postgres::{PostgreSQLConnectionInfo, create_db_postgres};\nuse anyhow::Error;\nuse sea_orm::{DatabaseConnection, SqlxPostgresConnector};\n\npub enum DBType\u003cT\u003e\nwhere\n    T: AsRef\u003cstr\u003e,\n{\n    AuroraDSQL(AuroraDSQLConnectionInfo\u003cT\u003e),\n    PostgreSQL(PostgreSQLConnectionInfo\u003cT\u003e),\n}\n\npub async fn create_db\u003cT\u003e(db_type: DBType\u003cT\u003e) -\u003e Result\u003cDatabaseConnection, Error\u003e\nwhere\n    T: AsRef\u003cstr\u003e,\n{\n    let pool = match db_type {\n        DBType::AuroraDSQL(conn_info) =\u003e create_db_dsql(\u0026conn_info)\n            .await\n            .map_err(|e| anyhow::anyhow!(\"Failed to connect to Aurora DSQL: {}\", e))?,\n        DBType::PostgreSQL(conn_info) =\u003e create_db_postgres(\u0026conn_info)\n            .await\n            .map_err(|e| anyhow::anyhow!(\"Failed to connect to PostgreSQL: {}\", e))?,\n    };\n\n    Ok(SqlxPostgresConnector::from_sqlx_postgres_pool(pool))\n}\n","traces":[{"line":14,"address":[24914304,24914543],"length":1,"stats":{"Line":0}},{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[],"length":0,"stats":{"Line":0}},{"line":20,"address":[22623290,22623513,22623107,22623338,22623732],"length":1,"stats":{"Line":0}},{"line":21,"address":[22604929,22604947],"length":1,"stats":{"Line":0}},{"line":22,"address":[22624397,22623421,22623149,22624233,22624326],"length":1,"stats":{"Line":0}},{"line":23,"address":[22604910],"length":1,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":9},{"path":["/","workspaces","sns-system-public","core","infrastructure","db","src","db_dsql.rs"],"content":"//! # データベース接続モジュール\n//!\n//! このモジュールは、Amazon Aurora DSQL への接続管理を担当します。\n//! [`aurora_dsql_sqlx_connector`] クレートを使用して IAM 認証付きの接続プールを構築し、\n//! [`sea_orm`] の [`DatabaseConnection`] として提供します。\n//!\n//! ## Aurora DSQL について\n//!\n//! Amazon Aurora DSQL は、IAM ロールベースの認証を使用するサーバーレス分散 SQL データベースです。\n//! 通常の PostgreSQL と異なり、ユーザー名はロール名、パスワードは IAM 認証トークンで自動生成されます。\n//! このモジュールでは [`aurora_dsql_sqlx_connector`] がトークン生成と更新を自動的に処理します。\n//!\n//! ## 接続文字列の形式\n//!\n//! ```text\n//! postgres://\u003crole\u003e@\u003cendpoint\u003e/postgres?region=\u003cregion\u003e\n//! ```\n//!\n//! - `\u003crole\u003e`: データベースロール名（例: `lambda`, `selectview`）\n//! - `\u003cendpoint\u003e`: Aurora DSQL クラスターのエンドポイント（例: `abc123.dsql.ap-northeast-1.on.aws`）\n//! - `\u003cregion\u003e`: AWSリージョン（例: `ap-northeast-3`）\n//!\n//! ## 使用するロール\n//!\n//! Lambda 関数では以下のロールを使用します：\n//! - `lambda`: `messages` テーブルの SELECT / INSERT に使用\n\nuse anyhow::Error;\nuse aurora_dsql_sqlx_connector::pool;\nuse sea_orm::sqlx::PgPool;\n\n/// Aurora DSQL への接続文字列を構築する\n///\n/// 指定されたロール名、エンドポイント、リージョンから PostgreSQL 形式の接続文字列を生成します。\n/// [`aurora_dsql_sqlx_connector`] がこの文字列を解析して IAM 認証トークンを取得し、\n/// 実際のデータベース接続を確立します。\n///\n/// # Arguments\n///\n/// * `role` - データベースロール名（例: `\"lambda\"`, `\"selectview\"`)\n/// * `endpoint` - Aurora DSQL クラスターのエンドポイントホスト名\n///   （例: `\"abc123.dsql.ap-northeast-1.on.aws\"`）\n/// * `region` - Aurora DSQL クラスターが存在する AWS リージョン\n///   （例: `\"ap-northeast-3\"`）\n///\n/// # Returns\n///\n/// PostgreSQL URI 形式の接続文字列。\n/// `aurora_dsql_sqlx_connector` に渡すことで、IAM 認証が自動的に処理されます。\nfn build_connection_string(role: \u0026str, endpoint: \u0026str, region: \u0026str) -\u003e String {\n    format!(\"postgres://{role}@{endpoint}/postgres?region={region}\")\n}\n\n/// # AuroraDSQLConnectionInfo\n///\n/// * `role` - Aurora DSQL のデータベースロール名（例: `\"lambda\"`)\n/// * `endpoint` - Aurora DSQL クラスターのエンドポイントホスト名\n/// * `region` - Aurora DSQL クラスターが存在する AWS リージョン\npub struct AuroraDSQLConnectionInfo\u003cT\u003e\nwhere\n    T: AsRef\u003cstr\u003e,\n{\n    /// データベースロール名（例: `\"lambda\"`, `\"selectview\"`）\n    pub role: T,\n    /// Aurora DSQL クラスターのエンドポイントホスト名\n    pub endpoint: T,\n    /// Aurora DSQL クラスターが存在する AWS リージョン\n    pub region: T,\n}\n\n/// Aurora DSQL への SeaORM データベース接続を作成する\n///\n/// 指定されたロール・エンドポイント・リージョンを使用して Aurora DSQL への接続プールを構築し、\n/// [`sea_orm::DatabaseConnection`] として返します。\n///\n/// 接続確立には IAM 認証が使用されます。[`aurora_dsql_sqlx_connector`] が AWS STS と通信して\n/// 認証トークンを自動取得します。そのため、Lambda 関数の実行ロールに\n/// `dsql:DbConnectAdmin` または `dsql:DbConnect` 権限が必要です。\n///\n/// # Arguments\n///\n/// * `role` - Aurora DSQL のデータベースロール名（例: `\"lambda\"`)\n/// * `endpoint` - Aurora DSQL クラスターのエンドポイントホスト名\n/// * `region` - Aurora DSQL クラスターが存在する AWS リージョン\n///\n/// # Returns\n///\n/// * `Ok(DatabaseConnection)` - 正常に接続が確立された場合\n/// * `Err(Error)` - 接続に失敗した場合（IAM権限不足、ネットワークエラー等）\n///\n/// # Errors\n///\n/// - `aurora_dsql_sqlx_connector::pool::connect` が失敗した場合（IAM認証エラー、接続拒否等）\n///   `\"Failed to connect to database: ...\"` メッセージを含む [`anyhow::Error`] を返します。\npub async fn create_db_dsql\u003cT\u003e(role: \u0026AuroraDSQLConnectionInfo\u003cT\u003e) -\u003e Result\u003cPgPool, Error\u003e\nwhere\n    T: AsRef\u003cstr\u003e,\n{\n    tracing::info!(\"Creating database connection with Aurora DSQL SQLx connector...\");\n    let connection_string = build_connection_string(\n        role.role.as_ref(),\n        role.endpoint.as_ref(),\n        role.region.as_ref(),\n    );\n    let pool = pool::connect(\u0026connection_string)\n        .await\n        .map_err(|e| anyhow::anyhow!(\"Failed to connect to database: {}\", e))?;\n\n    Ok(pool)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn 接続文字列を正しく組み立てる() {\n        let actual = build_connection_string(\n            \"lambda\",\n            \"example.dsql.ap-northeast-3.on.aws\",\n            \"ap-northeast-3\",\n        );\n        assert_eq!(\n            actual,\n            \"postgres://lambda@example.dsql.ap-northeast-3.on.aws/postgres?region=ap-northeast-3\"\n                .to_string()\n        );\n    }\n\n    #[tokio::test(flavor = \"multi_thread\")]\n    #[ignore = \"ローカルのDBが必要なためデフォルトでは実行しない\"]\n    async fn エラー時に接続できないこと() {\n        let connection_info = AuroraDSQLConnectionInfo {\n            role: \"invalid_role\",\n            endpoint: \"invalid_endpoint\",\n            region: \"invalid_region\",\n        };\n        assert!(create_db_dsql(\u0026connection_info).await.is_err());\n    }\n}\n","traces":[{"line":50,"address":[22964688],"length":1,"stats":{"Line":1}},{"line":51,"address":[22524999],"length":1,"stats":{"Line":1}},{"line":95,"address":[22554752,22554947],"length":1,"stats":{"Line":0}},{"line":99," ;\n\n    // 所有権を持った Pool を返すためにクローン（sqlx::Pool のクローンは安価です）\n    Ok(pool.clone())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn envが未設定ならデフォルトurlを使う() {\n        assert_eq!(\n            resolve_database_url(\"lambda\", \"lambda\"),\n            \"postgres://lambda:lambda@localhost:5432/postgres?sslmode=disable\".to_string()\n        );\n    }\n\n    #[tokio::test(flavor = \"multi_thread\")]\n    #[ignore = \"ローカルのDBが必要なためデフォルトでは実行しない\"]\n    async fn 明示的にローカル_postgre_sqlへ接続できること() {\n        assert!(\n            create_db_postgres(\u0026PostgreSQLConnectionInfo {\n                role: \"lambda\",\n                password: \"lambda\",\n            })\n            .await\n            .is_ok()\n        );\n    }\n    #[tokio::test(flavor = \"multi_thread\")]\n    #[ignore = \"ローカルのDBが必要なためデフォルトでは実行しない\"]\n    async fn ローカル_postgre_sqlへ接続できない時にエラーになること() {\n        assert!(\n            create_db_postgres(\u0026PostgreSQLConnectionInfo {\n                role: \"invalid_role\",\n                password: \"invalid_password\",\n            })\n            .await\n            .is_err()\n        );\n    }\n}\n","traces":[{"line":4,"address":[22964480],"length":1,"stats":{"Line":1}},{"line":5,"address":[22576980],"length":1,"stats":{"Line":1}},{"line":26,"address":[22521216],"length":1,"stats":{"Line":0}},{"line":33,"address":[22586024],"length":1,"stats":{"Line":0}},{"line":34,"address":[24883562],"length":1,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[22586375,22586072,22586574,22586289,22586328],"length":1,"stats":{"Line":0}},{"line":38,"address":[22587071,22586665,22587056,22586709],"length":1,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}}],"covered":2,"coverable":10},{"path":["/","workspaces","sns-system-public","core","infrastructure","db","src","lib.rs"],"content":"//! インフラ層(DB)の公開API。\n//!\n//! DB接続(SeaORMのDatabaseConnection)生成など、DB周りの共通機能を提供する。\n\npub mod db;\npub mod db_dsql;\npub mod db_postgres;\n\npub use crate::db_dsql::AuroraDSQLConnectionInfo;\npub use crate::db_postgres::PostgreSQLConnectionInfo;\npub use db::{DBType, create_db};\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn 公開re_exportが参照できる() {\n        let _create_db = create_db::\u003c\u0026str\u003e;\n        let _db_type_auroradsql = DBType::AuroraDSQL(AuroraDSQLConnectionInfo {\n            role: \"\",\n            endpoint: \"\",\n            region: \"\",\n        });\n        let _db_type_postgresql = DBType::PostgreSQL(PostgreSQLConnectionInfo {\n            role: \"\",\n            password: \"\",\n        });\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","sns-system-public","core","infrastructure","lambda","src","lambda_auth_repository.rs"],"content":"use crate::lambda_executor::lambda_executor;\nuse aws_lambda_events::cognito::CognitoEventUserPoolsPreSignup;\nuse core_domain::AuthRepository;\nuse lambda_runtime::LambdaEvent;\nuse std::{fmt::Debug, future::Future, pin::Pin};\n\n/// メールアドレスのドメイン部が許可リストに含まれているか検証する。\nfn is_allowed_domain(email: \u0026str, allowed_domains: \u0026str) -\u003e Result\u003cbool, lambda_runtime::Error\u003e {\n    let (_, domain) = email\n        .rsplit_once('@')\n        .ok_or_else(|| -\u003e lambda_runtime::Error {\n            String::from(\"メールアドレスの形式が不正です\").into()\n        })?;\n    let domain = domain.to_ascii_lowercase();\n\n    Ok(allowed_domains\n        .split(',')\n        .any(|d| d.trim().to_ascii_lowercase() == domain))\n}\n\n/// Cognito の Pre Sign-Up トリガー要求を検証し、そのまま返却する。\nfn function_handler(\n    event: LambdaEvent\u003cCognitoEventUserPoolsPreSignup\u003e,\n    allowed_domains: \u0026str,\n) -\u003e Result\u003cCognitoEventUserPoolsPreSignup, lambda_runtime::Error\u003e {\n    let email = event\n        .payload\n        .request\n        .user_attributes\n        .get(\"email\")\n        .map(String::as_str)\n        .ok_or_else(|| -\u003e lambda_runtime::Error {\n            String::from(\"リクエストにメールアドレスが含まれていません\").into()\n        })?;\n\n    if is_allowed_domain(email, allowed_domains)? {\n        Ok(event.payload)\n    } else {\n        let domain = email.rsplit_once('@').map(|(_, d)| d).unwrap_or(\"\");\n        Err(format!(\"メールアドレスのドメイン '{}' は許可されていません\", domain).into())\n    }\n}\n\n/// Lambdaを利用したメッセージRepository実装。\n#[derive(Debug)]\npub struct LambdaAuthRepository\u003cT\u003e\nwhere\n    T: AsRef\u003cstr\u003e + Send + Sync + Debug,\n{\n    allowed_domains: T,\n}\n\nimpl\u003cT\u003e LambdaAuthRepository\u003cT\u003e\nwhere\n    T: AsRef\u003cstr\u003e + Send + Sync + Debug,\n{\n    /// DB接続を受け取りRepositoryを生成する。\n    pub fn new(allowed_domains: T) -\u003e Self {\n        Self { allowed_domains }\n    }\n}\n\nimpl\u003cT\u003e AuthRepository for LambdaAuthRepository\u003cT\u003e\nwhere\n    T: AsRef\u003cstr\u003e + Send + Sync + Debug,\n{\n    fn execute(\n        \u0026self,\n    ) -\u003e Pin\u003c\n        Box\u003cdyn Future\u003cOutput = Result\u003c(), Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e\u003e + Send + '_\u003e,\n    \u003e {\n        // 1. まず String に変換して self の寿命から切り離す\n        let allowed_domains = self.allowed_domains.as_ref().to_string();\n\n        // 💡 修正ポイント: 外側の Box::pin は削除し、lambda_executor を直接返す。\n        // ただし、型を Pin\u003cBox\u003cdyn Future...\u003e\u003e に合わせるため、全体をラップして返します。\n        Box::pin(lambda_executor(move |event| {\n            // クロージャが呼ばれるたびにクローンし、任意のライフタイムに対応させる\n            let allowed_domains_cloned = allowed_domains.clone();\n            async move { function_handler(event, \u0026allowed_domains_cloned) }\n        }))\n    }\n}\n\n// impl\u003cV, F, Fut\u003e AuthRepository for LambdaAuthRepository\u003cV, F, Fut\u003e\n// where\n//     F: FnOnce(\n//         Box\u003c\n//             dyn FnMut(\n//                     LambdaEvent\u003cCognitoEventUserPoolsPreSignup\u003e,\n// ,"traces":[{"line":14,"address":[6695552,6695698],"length":1,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":2},{"path":["/","workspaces","sns-system-public","core","infrastructure","lambda","src","lib.rs"],"content":"//! インフラ層のLambda実行モジュール\n//!\n//! このモジュールは、AWS Lambdaの実行環境での共通処理を提供します。\n\npub mod lambda_auth_repository;\npub mod lambda_executor;\n\npub use lambda_auth_repository::LambdaAuthRepository;\npub use lambda_executor::lambda_executor;\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","sns-system-public","core","infrastructure","sea_orm","src","lib.rs"],"content":"//! インフラ層の公開API。\n//!\n//! Domainで定義したRepository traitを、SeaORMとDBスキーマに接続して実装する。\n\npub mod sea_orm_message_repository;\n\npub use sea_orm_message_repository::SeaOrmMessageRepository;\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn 公開re_exportが参照できる() {\n        let _repo_ctor: fn(sea_orm::prelude::DatabaseConnection) -\u003e SeaOrmMessageRepository =\n            SeaOrmMessageRepository::new;\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","sns-system-public","core","infrastructure","sea_orm","src","sea_orm_message_repository.rs"],"content":"use async_trait::async_trait;\nuse chrono::{DateTime, Utc};\nuse core_common::{CoreError, CoreResult};\nuse core_domain::{MessageRepository, NewMessage, TimelineMessage};\nuse sea_orm::entity::prelude::Uuid;\nuse sea_orm::{ConnectionTrait, DatabaseConnection, DbBackend, QueryResult, Statement};\n\n/// SeaORMを利用したメッセージRepository実装。\n#[derive(Clone)]\npub struct SeaOrmMessageRepository {\n    db: DatabaseConnection,\n}\n\nimpl SeaOrmMessageRepository {\n    /// DB接続を受け取りRepositoryを生成する。\n    pub fn new(db: DatabaseConnection) -\u003e Self {\n        Self { db }\n    }\n}\n\n#[async_trait]\nimpl MessageRepository for SeaOrmMessageRepository {\n    async fn list_latest(\n        \u0026self,\n        before: Option\u003cDateTime\u003cUtc\u003e\u003e,\n        limit: u64,\n    ) -\u003e CoreResult\u003cVec\u003cTimelineMessage\u003e\u003e {\n        let statement = build_timeline_statement(before, limit);\n        let rows = self.db.query_all(statement).await.map_err(|e| {\n            tracing::error!(\"タイムライン取得に失敗しました: {e}\");\n            CoreError::Infrastructure(format!(\"タイムライン取得に失敗しました: {e}\"))\n        })?;\n\n        rows.into_iter().map(to_timeline_message).collect()\n    }\n\n    async fn create(\u0026self, input: NewMessage) -\u003e CoreResult\u003c()\u003e {\n        // Statementの組み立て\n        let statement = build_create_message_statement(input);\n\n        self.db.query_all(statement).await.map_err(|e| {\n            tracing::error!(\"メッセージ作成に失敗しました: {e}\");\n            CoreError::Infrastructure(format!(\"メッセージ作成に失敗しました: {e}\"))\n        })?;\n\n        Ok(())\n    }\n}\n\nfn build_create_message_statement(input: NewMessage) -\u003e Statement {\n    // 挿入する値を準備\n    let id = Uuid::now_v7();\n    let user_name = input.user_name.as_str().to_string();\n    let cognito_id = input.user_id.into_inner();\n    let created_at: chrono::DateTime\u003cchrono::FixedOffset\u003e = input.created_at.into(); // 型は環境に合わせて調整してください\n    let body = input.body.as_str().to_string();\n    let row_log = input.row_log;\n    let is_from_user = input.is_from_user;\n\n    Statement::from_sql_and_values(\n        DbBackend::Postgres,\n        r#\"\n                INSERT INTO public.messages (id, user_name, cognito_id, created_at, body, row_log, is_from_user)\n                VALUES ($1, $2, $3, $4, $5, $6, $7)\n            \"#,\n        [\n            id.into(),\n            user_name.into(),\n            cognito_id.into(),\n            created_at.into(),\n            body.into(),\n            row_log.into(),\n            is_from_user.into(),\n        ],\n    )\n}\n\nfn build_timeline_statement(before: Option\u003cDateTime\u003cUtc\u003e\u003e, limit: u64) -\u003e Statement {\n    let safe_limit = if limit == 0 || limit \u003e 50 {\n        50\n    } else {\n        limit as i64\n    };\n\n    match before {\n        Some(before) =\u003e Statement::from_sql_and_values(\n            DbBackend::Postgres,\n            r#\"\n                SELECT user_name, created_at, body, is_from_user\n                FROM public.messages_latest\n                WHERE created_at \u003c $1\n                ORDER BY created_at DESC\n                LIMIT $2\n            \"#,\n            [before.into(), safe_limit.into()],\n        ),\n        None =\u003e Statement::from_sql_and_values(\n            DbBackend::Postgres,\n            r#\"\n                SELECT user_name, created_at, body, is_from_user\n                FROM public.messages_latest\n                ORDER BY created_at DESC\n                LIMIT $1\n            \"#,\n            [safe_limit.into()],\n        ),\n    }\n}\n\nfn to_timeline_message(row: QueryResult) -\u003e CoreResult\u003cTimelineMessage\u003e {\n    let created_at = row\n        .try_get::\u003cDateTime\u003cUtc\u003e\u003e(\"\", \"created_at\")\n        .map_err(|e| {\n            tracing::error!(\"created_atの変換に失敗しました: {e}\");\n            CoreError::Infrastructure(format!(\"created_atの変換に失敗しました: {e}\"))\n        })?;\n\n    Ok(TimelineMessage {\n        user_name: row.try_get(\"\", \"user_name\").map_err(|e| {\n            tracing::error!(\"user_nameの変換に失敗しました: {e}\");\n            CoreError::Infrastructure(format!(\"user_nameの変換に失敗しました: {e}\"))\n        })?,\n        created_at,\n        body: row.try_get(\"\", \"body\").map_err(|e| {\n            tracing::error!(\"bodyの変換に失敗しました: {e}\");\n            CoreError::Infrastructure(format!(\"bodyの変換に失敗しました: {e}\"))\n        })?,\n        is_from_user: row.try_get(\"\", \"is_from_user\").map_err(|e| {\n            tracing::error!(\"is_from_userの変換に失敗しました: {e}\");\n            CoreError::Infrastructure(format!(\"is_from_userの変換に失敗しました: {e}\"))\n        })?,\n    })\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use chrono::Utc;\n    use core_common::Clock;\n    use core_infrastructure_db::{DBType, PostgreSQLConnectionInfo, create_db};\n    // use sea_orm::{ActiveModelTrait, ColumnTrait, Database, EntityTrait, QueryFilter, Set};\n    // use sea_orm_entities::entity::messages::{self, Column, Entity as Messages};\n    use core_usecase::{\n        GetTimelineInput, GetTimelineOutput, GetTimelineUseCase, PostMessageInput,\n        PostMessageUseCase, TimelineItem,\n    };\n    use serde::{Deserialize, Serialize};\n\n    // テスト用の時刻固定モック構造体\n    struct MockClock {\n        fixed_time: DateTime\u003cUtc\u003e,\n    }\n\n    impl MockClock {\n        /// 指定した初期時刻でモックを作成する\n        pub fn new(initial_time: DateTime\u003cUtc\u003e) -\u003e Self {\n            Self {\n                fixed_time: initial_time,\n            }\n        }\n\n        /// テストの途中で任意の時刻に変更する\n        #[allow(unused)]\n        pub fn set_time(\u0026mut self, new_time: DateTime\u003cUtc\u003e) {\n            self.fixed_time = new_time;\n        }\n\n        /// テストの途中で任意の時刻を加算する\n        #[allow(unused)]\n        pub fn add_time(\u0026mut self, duration: chrono::Duration) {\n            self.fixed_time += duration;\n        }\n    }\n\n    // Clock トレイトを実装\n    impl Clock for MockClock {\n        fn now(\u0026self) -\u003e DateTime\u003cUtc\u003e {\n            self.fixed_time\n        }\n    }\n    /// タイムライン取得レスポンス。\n    #[derive(Debug, Clone, Serialize, Deserialize, PartialEq, Eq)]\n    pub struct TimelineMessageResponse {\n        /// 投稿者名。\n        pub user_name: String,\n        /// 投稿日時。\n        pub created_at: DateTime\u003cUtc\u003e,\n        /// 投稿本文。\n        pub body: String,\n        /// 利用者投稿かどうか。\n        pub is_from_user: bool,\n    }\n\n    impl From\u003cTimelineItem\u003e for TimelineMessageResponse {\n        fn from(value: TimelineItem) -\u003e Self {\n            Self {\n                user_name: value.user_name,\n                created_at: value.created_at,\n                body: value.body,\n                is_from_user: value.is_from_user,\n            }\n        }\n    }\n\n    #[test]\n    fn limitが0の場合はクエリで50件に補正する() {\n        let statement = build_timeline_statement(None, 0);\n        let debug = format!(\"{statement:?}\");\n        assert!(debug.contains(\"LIMIT $1\"));\n        assert!(debug.contains(\"50\"));\n    }\n\n    #[test]\n    fn limitが51以上の場合もクエリで50件に補正する() {\n        let statement = build_timeline_statement(None, 99);\n        let debug = format!(\"{statement:?}\");\n        assert!(debug.contains(\"LIMIT $1\"));\n        assert!(debug.contains(\"50\"));\n    }\n\n    #[test]\n    fn beforeありのクエリを組み立てる() {\n        let before = Utc::now();\n        let statement = build_timeline_statement(Some(before), 10);\n        let debug = format!(\"{statement:?}\");\n        assert!(debug.contains(\"WHERE created_at \u003c $1\"));\n        assert!(debug.contains(\"LIMIT $2\"));\n    }\n\n    #[test]\n    fn メッセージ作成sqlを組み立てる() {\n        let statement = build_create_message_statement(NewMessage {\n            user_name: core_domain::UserName::new(\"taro\").expect(\"正常系で失敗しない想定\"),\n            user_id: core_domain::UserId::new(uuid::Uuid::now_v7()),\n            body: core_domain::MessageBody::new(\"hello\").expect(\"正常系で失敗しない想定\"),\n            created_at: Utc::now(),\n            is_from_user: true,\n            row_log: \"row-log\".to_string(),\n        });\n\n        let debug = format!(\"{statement:?}\");\n        assert!(debug.contains(\"INSERT INTO public.messages\"));\n        assert!(debug.contains(\"VALUES ($1, $2, $3, $4, $5, $6, $7)\"));\n    }\n\n    #[tokio::test]\n    #[ignore = \"ローカルのDBが必要なためデフォルトでは実行しない\"]\n    async fn 実際にローカルの_postgre_sqlに接続するテスト() {\n        let db = create_db(DBType::PostgreSQL(PostgreSQLConnectionInfo {\n            role: \"lambda\",\n            password: \"lambda\",\n        }))\n        .await\n        .unwrap();\n        let repository = SeaOrmMessageRepository::new(db.clone());\n        let now = chrono::Utc::now().fixed_offset();\n\n        let first_uuid = uuid::Uuid::new_v4();\n        let email = format!(\"local-get-{}@example.com\", first_uuid);\n        let clock = MockClock::new(now.into());\n        let usecase = PostMessageUseCase::new(repository.clone(), clock);\n        usecase\n            .execute(PostMessageInput {\n                user_id: first_uuid,\n                user_name: email.clone(),\n                body: \"older body\".to_string(),\n                row_log: \"older row log\".to_string(),\n                is_from_user: true,\n            })\n            .await\n            .expect(\"older test message insert should succeed\");\n\n        let second_uuid = uuid::Uuid::new_v4();\n        let second_email = format!(\"local-get-{}@example.com\", second_uuid);\n        let clock = MockClock::new((now + chrono::Duration::seconds(1)).into());\n        let usecase = PostMessageUseCase::new(repository.clone(), clock);\n        usecase\n            .execute(PostMessageInput {\n                user_id: second_uuid,\n                user_name: second_email.clone(),\n                body: \"second body\".to_string(),\n                row_log: \"second row log\".to_string(),\n                is_from_user: false,\n            })\n            .await\n            .expect(\"newer test message insert should succeed\");\n\n        let third_uuid = uuid::Uuid::new_v4();\n        let third_email = format!(\"local-get-{}@example.com\", third_uuid);\n        let clock = MockClock::new((now + chrono::Duration::seconds(2)).into());\n        let usecase = PostMessageUseCase::new(repository.clone(), clock);\n        usecase\n            .execute(PostMessageInput {\n                user_id: third_uuid,\n                user_name: third_email.clone(),\n                body: \"third body\".to_string(),\n                row_log: \"third row log\".to_string(),\n                is_from_user: true,\n            })\n            .await\n            .expect(\"newer test message insert should succeed\");\n\n        let usecase = GetTimelineUseCase::new(repository.clone());\n        let output: GetTimelineOutput = match usecase\n            .execute(GetTimelineInput {\n                limit: 2,\n                before: None,\n            })\n            .await\n        {\n            Ok(output) =\u003e output,\n            Err(err) =\u003e panic!(\"usecase execution failed: {}\", err),\n        };\n        assert_eq!(output.items.len(), 2);\n        let response: Vec\u003cTimelineMessageResponse\u003e = output\n            .items\n            .into_iter()\n            .map(TimelineMessageResponse::from)\n            .collect();\n\n        assert_eq!(\n            response[0].created_at,\n            (now + chrono::Duration::seconds(2))\n                .format(\"%Y-%m-%dT%H:%M:%S.%6fZ\")\n                .to_string()\n                .parse::\u003cDateTime\u003cUtc\u003e\u003e()\n                .unwrap()\n        );\n        assert_eq!(\n            response[1].created_at,\n            (now + chrono::Duration::seconds(1))\n                .format(\"%Y-%m-%dT%H:%M:%S.%6fZ\")\n                .to_string()\n                .parse::\u003cDateTime\u003cUtc\u003e\u003e()\n                .unwrap()\n        );\n\n        assert_eq!(response[0].body, \"third body\");\n        assert_eq!(response[1].body, \"second body\");\n\n        assert!(response[0].is_from_user);\n        assert!(!response[1].is_from_user);\n\n        assert_eq!(response[0].user_name, third_email);\n        assert_eq!(response[1].user_name, second_email);\n    }\n}\n","traces":[{"line":16,"address":[25757968],"length":1,"stats":{"Line":0}},{"line":23,"address":[48626643,48628154,48627002,48627066,48627316,48628113,48628140,48626730,48626608],"length":1,"stats":{"Line":0}},{"line":28,"address":[25663430],"length":1,"stats":{"Line":0}},{"line":29,"address":[22607604],"length":1,"stats":{"Line":0}},{"line":30,"address":[25767951,25768030,25768418],"length":1,"stats
